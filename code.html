<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monster Operator Battle - Camera Edition</title>
    <style>
        :root {
            --primary-blue: #00e5ff;
            --dark-bg: #05162a;
            --panel-bg: rgba(10, 40, 70, 0.8);
            --text-color: #fff;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--dark-bg);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle, #1a3a63 0%, #05162a 100%);
        }

        .game-window {
            width: 1200px;
            height: 750px;
            background: var(--panel-bg);
            border: 2px solid var(--primary-blue);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            text-align: center;
            padding: 10px;
            border-bottom: 2px solid var(--primary-blue);
            background: rgba(0, 229, 255, 0.1);
        }
        .header h1 { margin: 0; font-size: 24px; color: var(--primary-blue); }

        .battle-area { flex: 1; display: flex; flex-direction: column; }

        /* ボスエリア */
        .boss-section {
            flex: 1;
            border-bottom: 2px solid var(--primary-blue);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 20px;
            background-color: #111; /* 画像がない場合の背景色 */
            background-image: url('boss.jpg'); /* ボス画像を用意してください */
            background-size: cover;
            background-position: center;
        }

        .boss-stats-panel {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #ff4444;
            padding: 10px;
            width: 250px;
            font-size: 0.9rem;
        }
        .boss-stats-panel h3 { color: #ff4444; margin: 0 0 10px 0; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 5px; border-bottom: 1px dotted #555; }
        
        .boss-info-panel {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--primary-blue);
            padding: 10px 20px;
            width: 300px;
            text-align: right;
        }
        .boss-name { font-size: 1.4rem; color: #ff4444; font-weight: bold; }
        .hp-text { font-size: 1.2rem; color: var(--primary-blue); margin-top: 5px;}

        /* プレイヤーエリア */
        .player-section {
            flex: 1;
            display: flex;
            padding: 20px;
            background: rgba(0, 229, 255, 0.05);
            gap: 20px;
        }

        /* カメラ＆画像エリア */
        .camera-container {
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .monitor {
            width: 100%;
            height: 225px;
            background: #000;
            border: 2px dashed var(--primary-blue);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        #videoElement { width: 100%; height: 100%; object-fit: cover; display: none; }
        #monsterImage { width: 100%; height: 100%; object-fit: cover; display: none; }
        .camera-btns { display: flex; gap: 10px; }
        .camera-btns button {
            flex: 1;
            padding: 8px;
            background: var(--dark-bg);
            color: var(--primary-blue);
            border: 1px solid var(--primary-blue);
            cursor: pointer;
        }
        .camera-btns button:hover { background: var(--primary-blue); color: var(--dark-bg); }

        /* ステータス選択エリア */
        .status-inputs {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .status-inputs h2 { color: var(--primary-blue); margin: 0 0 10px 0; font-size: 1.2rem; }
        
        .input-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.4);
            padding: 5px 10px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .input-group select {
            width: 150px;
            background: var(--dark-bg);
            color: var(--text-color);
            border: 1px solid var(--primary-blue);
            padding: 5px;
            font-family: inherit;
        }
        .stat-result {
            width: 50px;
            text-align: right;
            color: var(--primary-blue);
            font-weight: bold;
        }

        .total-score {
            margin-top: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            border-top: 1px solid var(--text-color);
            padding-top: 5px;
        }

        /* アクションボタン群 */
        .action-container {
            width: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 15px;
        }
        .btn {
            padding: 15px;
            background: none;
            border: 2px solid var(--primary-blue);
            color: var(--primary-blue);
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .btn:hover { background: var(--primary-blue); color: var(--dark-bg); }
        .btn:disabled { border-color: #555; color: #555; cursor: not-allowed; background: none; }
        .btn-battle { border-color: #ff4444; color: #ff4444; }
        .btn-battle:hover { background: #ff4444; color: #fff; }

        canvas { display: none; }
    </style>
</head>
<body>

<div class="game-window">
    <div class="header">
        <h1>Monster Operator Battle</h1>
    </div>

    <div class="battle-area">
        <div class="boss-section">
            <div class="boss-stats-panel">
                <h3>BOSS STATS (Generated)</h3>
                <div class="stat-row"><span>Carrier:</span> <span id="bossStat1">???</span></div>
                <div class="stat-row"><span>Plan:</span> <span id="bossStat2">???</span></div>
                <div class="stat-row"><span>Fixed Line:</span> <span id="bossStat3">???</span></div>
                <div class="stat-row"><span>Years:</span> <span id="bossStat4">???</span></div>
            </div>

            <div class="boss-info-panel">
                <div class="boss-name">GIGA-CELL</div>
                <div class="hp-text">TOTAL HP: <span id="bossTotal">???</span> / 1000</div>
            </div>
        </div>

        <div class="player-section">
            
            <div class="camera-container">
                <div class="monitor">
                    <span id="monitorText">NO SIGNAL<br>(Start Camera)</span>
                    <video id="videoElement" autoplay playsinline></video>
                    <img id="monsterImage" alt="Scanned Monster">
                </div>
                <div class="camera-btns">
                    <button onclick="startCamera()">カメラ起動</button>
                    <button onclick="takePhoto()" id="captureBtn" disabled>スキャン(撮影)</button>
                </div>
            </div>

            <div class="status-inputs">
                <h2>MOKA'S MONSTER SETUP</h2>
                
                <div class="input-group">
                    <label>1. 携帯キャリア</label>
                    <select id="sel1">
                        <option value="high">大手3大キャリア</option>
                        <option value="mid">サブブランド</option>
                        <option value="low">格安SIM (MVNO)</option>
                    </select>
                    <span class="stat-result" id="res1">0</span>
                </div>

                <div class="input-group">
                    <label>2. 月額料金</label>
                    <select id="sel2">
                        <option value="high">8,000円以上</option>
                        <option value="mid">4,000〜8,000円</option>
                        <option value="low">4,000円未満</option>
                    </select>
                    <span class="stat-result" id="res2">0</span>
                </div>

                <div class="input-group">
                    <label>3. 固定回線</label>
                    <select id="sel3">
                        <option value="high">光回線</option>
                        <option value="mid">ホームルーター</option>
                        <option value="low">なし / テザリング</option>
                    </select>
                    <span class="stat-result" id="res3">0</span>
                </div>

                <div class="input-group">
                    <label>4. 利用年数</label>
                    <select id="sel4">
                        <option value="high">5年以上</option>
                        <option value="mid">2〜5年</option>
                        <option value="low">2年未満</option>
                    </select>
                    <span class="stat-result" id="res4">0</span>
                </div>

                <div class="total-score">
                    <span>PLAYER TOTAL:</span>
                    <span id="playerTotal" style="color: var(--primary-blue);">0</span>
                </div>
            </div>

            <div class="action-container">
                <button class="btn" onclick="generateAllStats()" id="generateBtn" disabled>ステータス確定</button>
                <button class="btn btn-battle" onclick="startBattle()" id="battleBtn" disabled>BATTLE START</button>
            </div>

        </div>
    </div>
</div>

<canvas id="canvas"></canvas>

<script>
    // --- 変数管理 ---
    let playerTotalScore = 0;
    let bossTotalHp = 0;
    let imageScanned = false;
    let statsGenerated = false;

    const video = document.getElementById('videoElement');
    const canvas = document.getElementById('canvas');
    const monsterImage = document.getElementById('monsterImage');
    const monitorText = document.getElementById('monitorText');
    let stream = null;

    // --- 1. カメラ処理 ---
    async function startCamera() {
        try {
            // スマホの場合は背面カメラ(environment)を優先
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'environment' } 
            });
            video.srcObject = stream;
            video.style.display = 'block';
            monitorText.style.display = 'none';
            monsterImage.style.display = 'none';
            document.getElementById('captureBtn').disabled = false;
        } catch (err) {
            alert("カメラの起動に失敗しました。ローカルサーバー(http)かhttps環境で実行してください。\nエラー: " + err.message);
        }
    }

    function takePhoto() {
        if (!stream) return;
        
        // キャンバスにビデオの現在のフレームを描画
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
        
        // 画像として表示
        monsterImage.src = canvas.toDataURL('image/png');
        monsterImage.style.display = 'block';
        video.style.display = 'none';
        
        // カメラを停止
        stream.getTracks().forEach(track => track.stop());
        stream = null;
        document.getElementById('captureBtn').disabled = true;

        imageScanned = true;
        checkReady();
    }

    // --- 2. ステータスランダム生成処理 ---
    // 選択肢の強さ(high/mid/low)に応じてランダムな値を返す関数（MAX250）
    function rollStat(tier) {
        let min, max;
        if (tier === 'high') { min = 150; max = 250; }
        else if (tier === 'mid') { min = 80; max = 180; }
        else { min = 10; max = 100; }
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    // 完全ランダム（ボスの生成用）
    function rollRandomBossStat() {
        return Math.floor(Math.random() * 251); // 0〜250
    }

    function generateAllStats() {
        // --- プレイヤー側の生成 ---
        const s1 = rollStat(document.getElementById('sel1').value);
        const s2 = rollStat(document.getElementById('sel2').value);
        const s3 = rollStat(document.getElementById('sel3').value);
        const s4 = rollStat(document.getElementById('sel4').value);

        // 画面に反映（アニメーション風に少しずつ出しても面白いですが、今回は即時）
        document.getElementById('res1').textContent = s1;
        document.getElementById('res2').textContent = s2;
        document.getElementById('res3').textContent = s3;
        document.getElementById('res4').textContent = s4;

        playerTotalScore = s1 + s2 + s3 + s4;
        document.getElementById('playerTotal').textContent = playerTotalScore;

        // --- ボス側の生成 ---
        const b1 = rollRandomBossStat();
        const b2 = rollRandomBossStat();
        const b3 = rollRandomBossStat();
        const b4 = rollRandomBossStat();

        document.getElementById('bossStat1').textContent = b1;
        document.getElementById('bossStat2').textContent = b2;
        document.getElementById('bossStat3').textContent = b3;
        document.getElementById('bossStat4').textContent = b4;

        bossTotalHp = b1 + b2 + b3 + b4;
        document.getElementById('bossTotal').textContent = bossTotalHp;

        statsGenerated = true;
        checkReady();
    }

    // --- 3. バトル準備確認 ---
    function checkReady() {
        // 画像スキャンが完了したら「ステータス確定」ボタンを押せるようにする
        if (imageScanned) {
            document.getElementById('generateBtn').disabled = false;
        }

        // 両方完了したら「BATTLE START」を押せるようにする
        if (imageScanned && statsGenerated) {
            document.getElementById('battleBtn').disabled = false;
        }
    }

    // --- 4. バトル実行 ---
    function startBattle() {
        document.getElementById('battleBtn').disabled = true;

        // 1秒後に結果を表示
        setTimeout(() => {
            if (playerTotalScore >= bossTotalHp) {
                alert(`【VICTORY!】\nあなたの攻撃力: ${playerTotalScore}\nボスのHP: ${bossTotalHp}\n見事ボスを撃破しました！`);
            } else {
                alert(`【DEFEAT...】\nあなたの攻撃力: ${playerTotalScore}\nボスのHP: ${bossTotalHp}\nあと少し届かなかった...！`);
            }
        }, 500);
    }
</script>

</body>
</html>
