<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小鳥Lab AI Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&display=swap');
        [x-cloak] { display: none !important; }
        body { 
            font-family: 'Shippori Mincho', serif; 
            background-color: #f8f7f4;
            background-image: url('https://www.transparenttextures.com/patterns/handmade-paper.png'); 
        }
        .animation-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .chat-scroll { scroll-behavior: smooth; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-blur: 20px; border: 1px solid rgba(255, 255, 255, 0.5); }
        .user-bubble { background: #fb7185; color: white; border-radius: 1.5rem 1.5rem 0 1.5rem; }
        .ai-bubble { background: white; color: #444; border-radius: 1.5rem 1.5rem 1.5rem 0; border: 1px solid #f3f4f6; }
        pre { background: #2d2d2d; color: #ccc; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 0.5rem 0; position: relative; }
        .copy-btn { position: absolute; top: 5px; right: 5px; font-size: 10px; background: #444; padding: 2px 6px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body class="antialiased min-h-screen flex items-center justify-center p-0 sm:p-4 overflow-hidden" x-data="chatApp()">

    <canvas class="animation-canvas"></canvas>

    <div class="relative z-10 w-full max-w-7xl h-[95vh] glass shadow-2xl rounded-[2rem] flex overflow-hidden animate-in">
        
        <div class="w-20 md:w-64 border-r border-stone-200 flex flex-col bg-white/30">
            <div class="p-6 border-b border-stone-200">
                <h1 class="hidden md:block text-xl font-bold text-stone-800 tracking-widest">小鳥Lab AI</h1>
                <button @click="createNewChat()" class="mt-4 w-full bg-rose-400 hover:bg-rose-500 text-white p-2 rounded-xl transition-all flex items-center justify-center gap-2 text-sm shadow-md">
                    <i data-lucide="plus" class="w-4 h-4"></i> <span class="hidden md:inline">新規チャット</span>
                </button>
            </div>
            
            <div class="flex-1 overflow-y-auto p-3 space-y-2 chat-scroll">
                <template x-for="chat in chatHistory" :key="chat.id">
                    <div @click="loadChat(chat.id)" 
                         :class="currentChatId === chat.id ? 'bg-rose-100/50 border-rose-200' : 'hover:bg-white/50'"
                         class="p-3 rounded-xl cursor-pointer border border-transparent transition-all group flex justify-between items-center">
                        <div class="flex items-center gap-3 overflow-hidden">
                            <i data-lucide="message-square" class="w-4 h-4 text-rose-400 shrink-0"></i>
                            <span class="text-xs truncate text-stone-600 font-bold hidden md:block" x-text="chat.title"></span>
                        </div>
                        <button @click.stop="deleteChat(chat.id)" class="opacity-0 group-hover:opacity-100 text-stone-400 hover:text-red-500">
                            <i data-lucide="trash-2" class="w-3 h-3"></i>
                        </button>
                    </div>
                </template>
            </div>

            <div class="p-4 border-t border-stone-200 space-y-2">
                <button @click="showSettings = true" class="w-full text-xs text-stone-500 flex items-center gap-2 p-2 hover:bg-white/50 rounded-lg">
                    <i data-lucide="settings" class="w-4 h-4"></i> <span class="hidden md:inline">設定・API Key</span>
                </button>
            </div>
        </div>

        <div class="flex-1 flex flex-col bg-white/10">
            <div class="p-4 border-b border-stone-200 flex justify-between items-center bg-white/20">
                <div class="flex items-center gap-3">
                    <select x-model="config.model" class="text-xs bg-white/50 border border-stone-200 rounded-full px-4 py-1.5 outline-none focus:border-rose-300">
                        <option value="gemini-2.0-flash-lite-preview-02-05">Gemini 2.0 Flash-Lite (最速)</option>
                        <option value="gemini-2.0-flash">Gemini 2.0 Flash (最新標準)</option>
                        <option value="gemini-1.5-pro">Gemini 1.5 Pro (分析用)</option>
                    </select>
                </div>
                <div class="flex gap-2">
                    <button @click="exportChat()" class="text-stone-400 hover:text-rose-400 p-2" title="履歴を出力">
                        <i data-lucide="download" class="w-4 h-4"></i>
                    </button>
                    <label class="text-stone-400 hover:text-teal-400 p-2 cursor-pointer" title="履歴を読み込み">
                        <i data-lucide="upload" class="w-4 h-4"></i>
                        <input type="file" @change="importChat($event)" class="hidden">
                    </label>
                </div>
            </div>

            <div id="message-list" class="flex-1 overflow-y-auto p-4 sm:p-8 space-y-6 chat-scroll">
                <template x-for="(msg, index) in currentMessages" :key="index">
                    <div :class="msg.role === 'user' ? 'justify-end' : 'justify-start'" class="flex w-full animate-in">
                        <div :class="msg.role === 'user' ? 'user-bubble' : 'ai-bubble'" class="max-w-[85%] p-4 shadow-sm relative group">
                            <div class="text-xs opacity-50 mb-1 font-sans" x-text="msg.role === 'user' ? 'You' : 'Gemini'"></div>
                            <div class="prose prose-sm leading-relaxed break-words" x-html="renderMarkdown(msg.content)"></div>
                            <template x-if="msg.role === 'model'">
                                <button @click="copyToClipboard(msg.content)" class="absolute -bottom-6 right-0 text-[10px] text-stone-400 hover:text-rose-500 flex items-center gap-1">
                                    <i data-lucide="copy" class="w-3 h-3"></i> Copy
                                </button>
                            </template>
                        </div>
                    </div>
                </template>
                <div x-show="loading" class="flex justify-start animate-pulse">
                    <div class="ai-bubble p-4 text-xs text-stone-400">思考中...</div>
                </div>
            </div>

            <div class="p-6 border-t border-stone-200 bg-white/30 backdrop-blur-md">
                <div class="max-w-4xl mx-auto">
                    <template x-if="attachedFiles.length > 0">
                        <div class="flex gap-2 mb-3">
                            <template x-for="(file, idx) in attachedFiles" :key="idx">
                                <div class="text-[10px] bg-teal-50 text-teal-600 px-2 py-1 rounded-md border border-teal-100 flex items-center gap-1">
                                    <span x-text="file.name"></span>
                                    <button @click="attachedFiles.splice(idx, 1)"><i data-lucide="x" class="w-3 h-3"></i></button>
                                </div>
                            </template>
                        </div>
                    </template>
                    
                    <div class="flex items-end gap-3">
                        <label class="p-3 bg-stone-100 text-stone-400 rounded-2xl hover:bg-stone-200 transition-all cursor-pointer">
                            <i data-lucide="paperclip" class="w-5 h-5"></i>
                            <input type="file" multiple @change="handleFileUpload($event)" class="hidden">
                        </label>
                        <textarea x-model="userInput" @keydown.enter.prevent="if(!$event.shiftKey) send()"
                                  placeholder="メッセージを入力... (Shift+Enterで改行)"
                                  class="flex-1 bg-white border border-stone-200 rounded-2xl p-3 outline-none focus:border-rose-400 transition-all resize-none shadow-inner h-12 min-h-[3rem] max-h-48"></textarea>
                        <button @click="send()" :disabled="loading || !userInput.trim()"
                                class="bg-rose-400 text-white p-3 rounded-2xl shadow-lg shadow-rose-200 hover:bg-rose-500 disabled:opacity-30 transition-all">
                            <i data-lucide="send" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div x-show="showSettings" x-cloak class="fixed inset-0 z-50 flex items-center justify-center bg-stone-900/40 backdrop-blur-sm p-4">
        <div class="bg-white w-full max-w-md rounded-[2rem] p-8 shadow-2xl space-y-6">
            <h3 class="text-xl font-bold text-stone-800">Settings</h3>
            
            <div x-show="!authenticated" class="space-y-4">
                <p class="text-xs text-stone-400">設定を変更するにはパスワードが必要です</p>
                <input type="password" x-model="passAttempt" placeholder="Password (初期: admin)" class="w-full border-b-2 p-2 outline-none focus:border-rose-400">
                <button @click="verifyPassword()" class="w-full bg-stone-800 text-white p-3 rounded-xl">Unlock</button>
            </div>

            <div x-show="authenticated" class="space-y-4 animate-in">
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-rose-500 uppercase">Gemini API Key</label>
                    <input type="password" x-model="config.apiKey" placeholder="AI Studioで取得したキー" class="w-full border-b-2 p-2 outline-none focus:border-rose-400 text-sm">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-teal-600 uppercase">System Instruction (方向性)</label>
                    <textarea x-model="config.systemInstruction" rows="4" class="w-full border p-3 rounded-xl text-xs outline-none focus:border-teal-400"></textarea>
                </div>
                <button @click="saveSettings()" class="w-full bg-rose-400 text-white p-3 rounded-xl font-bold shadow-lg shadow-rose-200">設定を保存</button>
            </div>
            
            <button @click="showSettings = false" class="w-full text-xs text-stone-400 mt-2">閉じる</button>
        </div>
    </div>

    <script type="importmap">
    { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
    </script>
    <script type="module" src="./script/gai.js"></script>
</body>
</html>
