<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小鳥Lab - Background Player</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎵</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&display=swap');
        [x-cloak] { display: none !important; }
        body { 
            font-family: 'Shippori Mincho', serif; 
            background-color: #f8f7f4;
            background-image: url('https://www.transparenttextures.com/patterns/handmade-paper.png');
            overflow-y: hidden; /* 親はスクロールさせず内部でスクロール */
        }
        .animation-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .writing-vertical { writing-mode: vertical-rl; }
        .animate-in { animation: fade-in 1.2s ease-out forwards; }
        @keyframes fade-in { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 隠しプレイヤー (通信量削減 ＆ バックグラウンド維持) */
        #hidden-player-container {
            position: absolute; top: -9999px; left: -9999px; width: 1px; height: 1px; opacity: 0; z-index: -1;
        }
        
        /* スクロールバー装飾 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(244, 63, 94, 0.2); border-radius: 10px; }
    </style>
</head>

    <canvas class="animation-canvas"></canvas>

    <audio id="silent-audio" loop preload="auto" src="data:audio/mpeg;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4Ljc2LjEwMAAAAAAAAAAAAAAA//OEAAAAAAAAAAAAAAAAAAAAAAAASW5mbwAAAA8AAAAEAAABIAD+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+AAAAAExhdmM1OC4xMzQAAAAAAAAAAAAAAAAkAAAAAAAAASAAAAAAAAAApX/uEAAAAAABAAAAAAAAAAAAAAAAAAAA//OEZAAAAAAANIAAAAAExBTUUzLjEwMKqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq//OEZAAAAAAANIAAAAAExBTUUzLjEwMKqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq//OEZAAAAAAANIAAAAAExBTUUzLjEwMKqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq"></audio>
    
    <div id="hidden-player-container"><div id="youtube-player"></div></div>

    <div class="relative z-10 w-full max-w-5xl bg-white/70 backdrop-blur-3xl border border-white rounded-[2rem] shadow-2xl shadow-rose-200/30 flex flex-col md:flex-row animate-in h-[96dvh] md:h-[85vh] overflow-hidden" 
        x-data="musicPlayerApp()">
        
        <div class="md:w-1/3 p-6 sm:p-8 flex flex-col border-b md:border-b-0 md:border-r border-stone-200 relative bg-gradient-to-b from-rose-100/40 to-white/20 shrink-0">
            <div class="absolute top-0 right-4 p-8 opacity-10 text-4xl font-bold writing-vertical tracking-[0.6em] text-stone-900 pointer-events-none hidden md:block">背景再生</div>

    <script>
    // 🌸 桜アニメーション (完全復活)
    class SakuraAnimation {
        constructor(canvas) {
            this.canvas = canvas; this.ctx = canvas.getContext('2d'); this.petals = [];
            this.resize(); window.addEventListener('resize', () => this.resize());
            this.init(); this.animate();
        }
        resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; }
        init() {
            for (let i = 0; i < 40; i++) {
                this.petals.push({
                    x: Math.random() * this.canvas.width, y: Math.random() * this.canvas.height,
                    size: Math.random() * 6 + 8, speed: Math.random() * 0.5 + 0.2,
                    wind: Math.random() * 0.4 - 0.2, angle: Math.random() * 360,
                    rotateSpeed: Math.random() * 0.8 - 0.4, flip: Math.random() * Math.PI,
                    flipSpeed: Math.random() * 0.03 + 0.01,
                    color: `rgba(255, ${215 + Math.random() * 25}, ${225 + Math.random() * 20}, ${0.5 + Math.random() * 0.3})`
                });
            }
        }
        drawPetal(p) {
            const { ctx } = this; ctx.save();
            ctx.translate(p.x, p.y); ctx.rotate(p.angle * Math.PI / 180); ctx.scale(Math.cos(p.flip), 1);
            ctx.beginPath(); ctx.fillStyle = p.color; const s = p.size;
            ctx.moveTo(0, 0); ctx.bezierCurveTo(-s * 0.4, -s * 0.5, -s * 1.2, -s * 1.1, -s * 0.4, -s * 2.0);
            ctx.lineTo(0, -s * 1.5); ctx.lineTo(s * 0.4, -s * 2.0);
            ctx.bezierCurveTo(s * 1.2, -s * 1.1, s * 0.4, -s * 0.5, 0, 0);
            ctx.fill(); ctx.restore();
        }
        animate() {
            this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
            this.petals.forEach(p => {
                p.y += p.speed; p.x += p.wind; p.angle += p.rotateSpeed; p.flip += p.flipSpeed;
                if (p.y > this.canvas.height + 40) { p.y = -40; p.x = Math.random() * this.canvas.width; }
                this.drawPetal(p);
            });
            requestAnimationFrame(() => this.animate());
        }
    }

    // YouTube API グローバル管理
    let ytPlayer = null;
    let progressTimer = null;

    function onYouTubeIframeAPIReady() {
        ytPlayer = new YT.Player('youtube-player', {
            height: '1', width: '1', videoId: '',
            playerVars: { 'autoplay': 0, 'controls': 0, 'disablekb': 1, 'playsinline': 1 },
            events: {
                'onReady': (e) => {
                    e.target.setPlaybackQuality('small'); // 通信量削減
                    window.dispatchEvent(new CustomEvent('yt-ready'));
                },
                'onStateChange': (e) => {
                    window.dispatchEvent(new CustomEvent('yt-state-change', { detail: e.data }));
                },
                'onError': () => alert('動画の再生エラーが発生しました。')
            }
        });
    }

    function musicPlayerApp() {
        return {
            currentTab: 'search', // デフォルトは検索画面
            
            // 検索関連
            searchQuery: '',
            searchResult: null,
            showPlaylistSelector: false,
            
            // プレイリスト関連
            playlists: [],
            newPlaylistName: '',
            activePlaylistId: null,
            editingPlaylistId: null,
            editingName: '',
            
            // プレイヤー状態
            nowPlaying: null,
            isPlaying: false,
            isLooping: false,
            currentPlaylistId: null,
            progress: 0,
            currentTimeStr: '0:00',

            init() {
                setTimeout(() => lucide.createIcons(), 100);
                new SakuraAnimation(document.querySelector('.animation-canvas'));
                
                // データ復元
                const saved = localStorage.getItem('kotori_playlists_v2');
                if (saved) {
                    this.playlists = JSON.parse(saved);
                } else {
                    this.playlists = [{ id: Date.now().toString(), name: 'お気に入り', videos: [] }];
                    this.saveData();
                }

                // YouTube ステート監視
                window.addEventListener('yt-state-change', (e) => {
                    const state = e.detail;
                    if (state === YT.PlayerState.PLAYING) {
                        this.isPlaying = true;
                        this.updateVideoDuration(); // 再生開始時に秒数を取得して保存
                        this.startProgressTracker();
                        lucide.createIcons();
                    } else if (state === YT.PlayerState.PAUSED) {
                        this.isPlaying = false;
                        clearInterval(progressTimer);
                        lucide.createIcons();
                    } else if (state === YT.PlayerState.ENDED) {
                        this.isPlaying = false;
                        clearInterval(progressTimer);
                        if (this.isLooping) {
                            // ループ時は強制的に頭出しして再生（安定化）
                            ytPlayer.seekTo(0);
                            ytPlayer.playVideo();
                        } else {
                            this.skipNext();
                        }
                        lucide.createIcons();
                    }
                });
            },

            saveData() { localStorage.setItem('kotori_playlists_v2', JSON.stringify(this.playlists)); },

            // APIキー不要(oEmbed)による動画情報取得
            async searchVideo() {
                if (!this.searchQuery) return;
                const match = this.searchQuery.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/);
                if (!match) return alert('有効なYouTubeのURLを入力してください。');
                
                const vid = match[1];
                try {
                    const res = await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${vid}&format=json`);
                    const data = await res.json();
                    this.searchResult = {
                        id: vid,
                        title: data.title,
                        thumb: `https://img.youtube.com/vi/${vid}/mqdefault.jpg`,
                        duration: '' // 再生時に取得される
                    };
                } catch (e) {
                    // oEmbed非対応動画のフォールバック
                    this.searchResult = {
                        id: vid,
                        title: `YouTube Video (${vid})`,
                        thumb: `https://img.youtube.com/vi/${vid}/mqdefault.jpg`,
                        duration: ''
                    };
                }
                setTimeout(() => lucide.createIcons(), 50);
            },

            // --- プレイリスト管理 ---
            createPlaylist() {
                if (!this.newPlaylistName.trim()) return;
                this.playlists.push({ id: Date.now().toString(), name: this.newPlaylistName, videos: [] });
                this.newPlaylistName = '';
                this.saveData();
            },
            deletePlaylist(id) {
                if(confirm('プレイリストを削除しますか？')) {
                    this.playlists = this.playlists.filter(p => p.id !== id);
                    if(this.activePlaylistId === id) this.activePlaylistId = null;
                    this.saveData();
                }
            },
            startEditPlaylist(pl) {
                this.editingPlaylistId = pl.id;
                this.editingName = pl.name;
            },
            savePlaylistName(id) {
                const pl = this.playlists.find(p => p.id === id);
                if (pl && this.editingName.trim()) pl.name = this.editingName;
                this.editingPlaylistId = null;
                this.saveData();
            },
            addToPlaylist(playlistId, video) {
                const pl = this.playlists.find(p => p.id === playlistId);
                if (pl) {
                    pl.videos.push({ ...video });
                    this.saveData();
                    alert(`「${pl.name}」に追加しました`);
                }
            },
            removeVideo(playlistId, index) {
                const pl = this.playlists.find(p => p.id === playlistId);
                if (pl) { pl.videos.splice(index, 1); this.saveData(); }
            },
            moveVideo(playlistId, index, direction) {
                const pl = this.playlists.find(p => p.id === playlistId);
                if (pl) {
                    const newIndex = index + direction;
                    if (newIndex >= 0 && newIndex < pl.videos.length) {
                        [pl.videos[index], pl.videos[newIndex]] = [pl.videos[newIndex], pl.videos[index]];
                        this.saveData();
                    }
                }
            },

            // --- 再生ロジック ---
            playNow(video, playlistId = null) {
                if (!ytPlayer) return;

                // 同じ動画が選択された場合：一時停止バグの解消
                if (this.nowPlaying?.id === video.id) {
                    this.togglePlay();
                    return;
                }
                
                this.nowPlaying = video;
                this.currentPlaylistId = playlistId;
                this.progress = 0;
                this.currentTimeStr = '0:00';
                
                ytPlayer.loadVideoById(video.id);
                this.isPlaying = true; // 意図的先行設定
                
                this.manageSilentAudio(true); // バックグラウンド維持開始
                this.setupMediaSession(video);
                setTimeout(() => lucide.createIcons(), 50);
            },
            
            togglePlay() {
                if (!ytPlayer || !this.nowPlaying) return;
                if (this.isPlaying) {
                    ytPlayer.pauseVideo();
                    this.manageSilentAudio(false);
                } else {
                    ytPlayer.playVideo();
                    this.manageSilentAudio(true);
                }
            },

            toggleLoop() {
                this.isLooping = !this.isLooping;
            },

            playPlaylist(playlistId) {
                const pl = this.playlists.find(p => p.id === playlistId);
                if (pl && pl.videos.length > 0) this.playNow(pl.videos[0], playlistId);
            },

            skipNext() {
                if (!this.currentPlaylistId || !this.nowPlaying) return;
                const pl = this.playlists.find(p => p.id === this.currentPlaylistId);
                if (pl) {
                    const idx = pl.videos.findIndex(v => v.id === this.nowPlaying.id);
                    if (idx !== -1 && idx < pl.videos.length - 1) {
                        this.playNow(pl.videos[idx + 1], this.currentPlaylistId);
                    }
                }
            },

            // 再生開始時に秒数を取得してデータに反映
            updateVideoDuration() {
                if (!ytPlayer || !this.nowPlaying) return;
                const dur = ytPlayer.getDuration();
                if (dur > 0 && !this.nowPlaying.duration) {
                    const timeStr = this.formatTime(dur);
                    this.nowPlaying.duration = timeStr;
                    
                    // 検索結果の表示更新
                    if (this.searchResult && this.searchResult.id === this.nowPlaying.id) {
                        this.searchResult.duration = timeStr;
                    }
                    
                    // プレイリスト内の表示更新と保存
                    let updated = false;
                    this.playlists.forEach(pl => {
                        pl.videos.forEach(v => {
                            if (v.id === this.nowPlaying.id && !v.duration) {
                                v.duration = timeStr;
                                updated = true;
                            }
                        });
                    });
                    if (updated) this.saveData();
                }
            },

            startProgressTracker() {
                clearInterval(progressTimer);
                progressTimer = setInterval(() => {
                    if(ytPlayer && this.isPlaying) {
                        const curr = ytPlayer.getCurrentTime() || 0;
                        const dur = ytPlayer.getDuration() || 1;
                        this.progress = (curr / dur) * 100;
                        this.currentTimeStr = this.formatTime(curr);
                    }
                }, 1000);
            },

            formatTime(sec) {
                const m = Math.floor(sec / 60);
                const s = Math.floor(sec % 60);
                return `${m}:${s.toString().padStart(2, '0')}`;
            },

            // ★iOS/Android バックグラウンド停止対策ハック★
            manageSilentAudio(play) {
                const audio = document.getElementById('silent-audio');
                if (!audio) return;
                if (play) {
                    audio.volume = 0.01;
                    // ユーザーアクションコンテキストでの実行を保証
                    const playPromise = audio.play();
                    if (playPromise !== undefined) {
                        playPromise.catch(error => console.log("Silent audio blocked:", error));
                    }
                } else {
                    audio.pause();
                }
            },

            setupMediaSession(video) {
                if ('mediaSession' in navigator) {
                    navigator.mediaSession.metadata = new MediaMetadata({
                        title: video.title,
                        artist: '小鳥Lab BGM Player',
                        artwork: [{ src: video.thumb, sizes: '320x180', type: 'image/jpeg' }]
                    });
                    navigator.mediaSession.setActionHandler('play', () => this.togglePlay());
                    navigator.mediaSession.setActionHandler('pause', () => this.togglePlay());
                    navigator.mediaSession.setActionHandler('nexttrack', () => this.skipNext());
                }
            }
        }
    }
    </script>
