<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小鳥Lab - Background Player Pro</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎵</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&display=swap');
        [x-cloak] { display: none !important; }
        
        html { scrollbar-width: thin; scrollbar-color: rgba(244, 63, 94, 0.4) transparent; }

        body { 
            font-family: 'Shippori Mincho', serif; 
            background-color: #f8f7f4;
            background-image: url('https://www.transparenttextures.com/patterns/handmade-paper.png');
            overflow: hidden; 
            width: 100vw; height: 100dvh;
            margin: 0; padding: 0;
            touch-action: manipulation; /* 誤ズーム防止 */
        }
        
        .animation-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .writing-vertical { writing-mode: vertical-rl; }
        
        /* 🛡️ Firefox Mobile バックグラウンド完全維持用コンテナ
           PC版サイトと同等の挙動を引き出すため、画面右下に1x1px (不透明度0.01)で配置 */
        .phantom-media-container {
            position: fixed;
            bottom: 0; right: 0;
            width: 1px; height: 1px;
            opacity: 0.01;
            z-index: 9999;
            pointer-events: none;
            overflow: hidden;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(244, 63, 94, 0.2); border-radius: 10px; }
    </style>
</head>

    <canvas class="animation-canvas"></canvas>

    <div class="phantom-media-container">
        <video id="phantom-mp4-video" loop playsinline muted preload="auto">
            <source src="data:video/mp4;base64,AAAAIGZ0eXBpc29tAAACAGlzb21pbmYxbXA0MgADOG1vb3YAAABsbXZoZAAAAADR6S8X0ekvFwAAA+gAAAAAAAEAAAEAAAAAAAAAAAAAAAABAAAAAAAAAAAAAAAAAAAAAQAAAAAAAAAAAAAAAAAAQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAIAAABidHJha2sAAABcdGtoZAAAAADR6S8X0ekvFwAAAAEAAAAAAAABAAAAAAAAAAAAAAAAAQAAAAAAAAAAAAAAAAAAQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAIAAABtZWRpYQAAACBtZGhkAAAAANHpLxfR6S8XAAA+gAAAAABVxAAAAAAALWhkbHIAAAAAAAAAAHZpZGUAAAAAAAAAAAAAAABWaWRlb0hhbmRsZXIAAAAFbWluZgAAABxtdmhkAAAAAAAQAAAAAAAAAAAAAAAAAAAAAAAkZGluZgAAABxkcmVmAAAAAAAAAAEAAAAMdXJsIAAAAAEAAABNc3RibAAAADtzdHNkAAAAAAAAAAEAAAArYXZjMQAAAAAAAAABAAAAAAAAAAAAAAAAAAAAAAAIAAgAEAAAAAAAEAAhbm9uZQAAAAAAAAAAAB9mcmVlAAAAGW1kYXQ=" type="video/mp4">
        </video>
        <div id="youtube-player"></div>
    </div>

    <div class="relative z-10 w-full max-w-5xl bg-white/80 backdrop-blur-3xl border border-white rounded-3xl shadow-2xl shadow-rose-200/30 flex flex-col md:flex-row h-[96dvh] md:h-[85vh] overflow-hidden box-border">
        
        <input type="file" id="import-file" class="hidden" @change="handleFileImport($event)" accept=".txt">

        <div class="md:w-1/3 p-4 sm:p-8 flex flex-col border-b md:border-b-0 md:border-r border-stone-200 relative bg-gradient-to-b from-rose-100/40 to-white/20 shrink-0 box-border">
            <div class="absolute top-0 right-4 p-8 opacity-10 text-4xl font-bold writing-vertical tracking-[0.6em] text-stone-900 pointer-events-none hidden md:block">背景再生</div>
            
            <div class="relative mb-4 md:mb-6">
                <div class="inline-block px-3 py-1 bg-rose-400 text-white text-[10px] tracking-[0.2em] mb-2 md:mb-3 rounded-full font-sans font-bold shadow-md">PLAYER PRO</div>
                <h2 class="text-xl sm:text-2xl font-bold tracking-widest text-stone-800 leading-tight">小鳥Lab<br>BGM Player</h2>
            </div>
            
            <div class="space-y-2 relative z-10 flex md:flex-col gap-2 md:gap-0 w-full">
                <button @click="currentTab = 'search'" :class="currentTab === 'search' ? 'bg-white shadow-sm text-rose-500' : 'hover:bg-white/50 text-stone-600'" class="flex-1 md:w-full flex items-center justify-center md:justify-start gap-2 md:gap-3 p-3 rounded-xl transition-all">
                    <i data-lucide="search" class="w-4 h-4 md:w-5 md:h-5"></i> <span class="font-bold tracking-wider text-xs md:text-sm">検索・追加</span>
                </button>
                <button @click="currentTab = 'playlists'" :class="currentTab === 'playlists' ? 'bg-white shadow-sm text-rose-500' : 'hover:bg-white/50 text-stone-600'" class="flex-1 md:w-full flex items-center justify-center md:justify-start gap-2 md:gap-3 p-3 rounded-xl transition-all">
                    <i data-lucide="list-music" class="w-4 h-4 md:w-5 md:h-5"></i> <span class="font-bold tracking-wider text-xs md:text-sm">リスト管理</span>
                </button>
            </div>

            <div x-show="nowPlaying" class="mt-auto pt-6 hidden md:block" x-transition>
                <p class="text-[10px] tracking-[0.2em] text-stone-400 mb-2 font-bold">NOW PLAYING</p>
                <div class="bg-white/80 p-3 rounded-2xl shadow-sm border border-white flex flex-col gap-3 relative overflow-hidden">
                    <div class="absolute bottom-0 left-0 w-full h-1.5 bg-rose-400/20 group cursor-pointer">
                        <div class="absolute top-0 left-0 h-full bg-rose-500 transition-all duration-300 pointer-events-none" :style="`width: ${progress}%`"></div>
                        <input type="range" min="0" max="100" step="0.1" :value="progress" @input="seekTo($event.target.value)" @mousedown="isDragging = true" @mouseup="isDragging = false" class="absolute top-0 left-0 w-full h-full opacity-0 cursor-pointer z-10 m-0 p-0">
                    </div>
                    <div class="flex items-center gap-3">
                        <img :src="nowPlaying?.thumb" class="w-12 h-12 rounded-lg object-cover shrink-0 shadow-sm">

                            <div class="text-xs font-bold text-stone-700 truncate" x-text="nowPlaying?.title"></div>

    <script>
    // 🌸 桜アニメーションエンジン
    class SakuraAnimation {
        constructor(canvas) {
            this.canvas = canvas; this.ctx = canvas.getContext('2d'); this.petals = [];
            this.resize(); window.addEventListener('resize', () => this.resize());
            this.init(); this.animate();
        }
        resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; }
        init() {
            for (let i = 0; i < 40; i++) {
                this.petals.push({
                    x: Math.random() * this.canvas.width, y: Math.random() * this.canvas.height,
                    size: Math.random() * 8 + 10, speed: Math.random() * 0.7 + 0.3,
                    wind: Math.random() * 0.6 - 0.3, angle: Math.random() * 360,
                    rotateSpeed: Math.random() * 1.2 - 0.6, flip: Math.random() * Math.PI,
                    flipSpeed: Math.random() * 0.04 + 0.01,
                    color: `rgba(255, ${215 + Math.random() * 25}, ${225 + Math.random() * 20}, ${0.5 + Math.random() * 0.4})`
                });
            }
        }
        drawPetal(p) {
            const { ctx } = this; ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.angle * Math.PI / 180); ctx.scale(Math.cos(p.flip), 1);
            ctx.beginPath(); ctx.fillStyle = p.color; const s = p.size;
            ctx.moveTo(0, 0); ctx.bezierCurveTo(-s * 0.4, -s * 0.5, -s * 1.2, -s * 1.1, -s * 0.4, -s * 2.0);
            ctx.lineTo(0, -s * 1.5); ctx.lineTo(s * 0.4, -s * 2.0);
            ctx.bezierCurveTo(s * 1.2, -s * 1.1, s * 0.4, -s * 0.5, 0, 0); ctx.fill(); ctx.restore();
        }
        animate() {
            this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
            this.petals.forEach(p => {
                p.y += p.speed; p.x += p.wind; p.angle += p.rotateSpeed; p.flip += p.flipSpeed;
                if (p.y > this.canvas.height + 40) { p.y = -40; p.x = Math.random() * this.canvas.width; }
                this.drawPetal(p);
            });
            requestAnimationFrame(() => this.animate());
        }
    }

    let ytPlayer = null;
    let progressTimer = null;

    // 🛡️ [再デバッグ済] YouTube API 初期化（広告回避ロジックの最終進化形）
    function onYouTubeIframeAPIReady() {
        ytPlayer = new YT.Player('youtube-player', {
            height: '100', width: '100', videoId: '', 
            playerVars: { 
                'autoplay': 1, 'controls': 0, 'disablekb': 1, 'playsinline': 1, 
                'rel': 0, 'modestbranding': 1, 'iv_load_policy': 3, 
                'origin': location.origin, 'widget_referrer': location.href
            },
            events: {
                'onReady': (e) => {
                    e.target.setPlaybackQuality('small');
                    window.dispatchEvent(new CustomEvent('yt-ready'));
                },
                'onStateChange': (e) => {
                    const player = e.target;
                    const state = e.data;

                    // 🚀 【最終版】広告回避ハック：広告検知時に「広告の最後」まで強制ジャンプ
                    if (state === YT.PlayerState.BUFFERING || state === YT.PlayerState.PLAYING) {
                        try {
                            if (typeof player.getAdState === 'function' && player.getAdState() === 1) {
                                player.setPlaybackQuality('small'); // データ節約
                                const adDuration = player.getDuration();
                                // 広告自体の長さが取得できればその終端へ、無理なら0.5秒刻みでスキップ
                                player.seekTo(adDuration ? adDuration : player.getCurrentTime() + 0.5, true);
                            }
                        } catch (err) {}
                    }
                    window.dispatchEvent(new CustomEvent('yt-state-change', { detail: state }));
                },
                'onError': (e) => {
                    let msg = "再生エラーが発生しました。";
                    if (e.data === 101 || e.data === 150) msg = "この動画は埋め込み再生不可です（制限設定）。";
                    else if (e.data === 100) msg = "動画が見つからないか削除されています。";
                    alert(msg);
                }
            }
        });
    }

    function musicPlayerApp() {
        return {
            currentTab: 'search', searchQuery: '', searchResult: null, showPlaylistSelector: false,
            playlists: [], newPlaylistName: '', activePlaylistId: null, editingPlaylistId: null, editingName: '',
            nowPlaying: null, isPlaying: false, currentPlaylistId: null, progress: 0, currentTimeStr: '0:00',
            isDragging: false, repeatMode: 0, // 0:Off, 1:One, 2:All

            init() {
                setTimeout(() => lucide.createIcons(), 100);
                new SakuraAnimation(document.querySelector('.animation-canvas'));
                
                // localStorageのキーを刷新してデータを安全にロード
                const saved = localStorage.getItem('kotori_playlists_pro_v2');
                if (saved) { this.playlists = JSON.parse(saved); }
                else { this.playlists = [{ id: Date.now().toString(), name: 'お気に入り', videos: [] }]; this.saveData(); }

                window.addEventListener('yt-state-change', (e) => {
                    const state = e.detail;
                    if (state === YT.PlayerState.PLAYING) {
                        this.isPlaying = true; this.updateVideoDuration(); this.startProgressTracker();
                        this.setupMediaSession(this.nowPlaying); 
                        this.syncPhantomVideo(true); // 🛡️ Firefox維持
                        lucide.createIcons();
                    } else if (state === YT.PlayerState.PAUSED) {
                        this.isPlaying = false; clearInterval(progressTimer); 
                        this.syncPhantomVideo(false); 
                        this.updateMediaSessionState(); lucide.createIcons();
                    } else if (state === YT.PlayerState.ENDED) {
                        this.isPlaying = false; clearInterval(progressTimer);
                        this.syncPhantomVideo(false);
                        
                        // ループ設定に応じた次の動作
                        if (this.repeatMode === 1) { 
                            ytPlayer.seekTo(0); ytPlayer.playVideo(); 
                        } else { 
                            this.skipNext(); 
                        }
                        lucide.createIcons();
                    }
                });
            },

            saveData() { localStorage.setItem('kotori_playlists_pro_v2', JSON.stringify(this.playlists)); },

            // 🛡️ Firefox バックグラウンド維持用（無音MP4を裏で鳴らす）
            syncPhantomVideo(play) {
                const dummy = document.getElementById('phantom-mp4-video');
                if (!dummy) return;
                if (play) { 
                    dummy.volume = 0.01; 
                    dummy.play().catch(()=>{ console.warn("Phantom video restricted by OS."); }); 
                } else { 
                    dummy.pause(); 
                }
            },

            // 📤 インポート/エクスポート
            exportPlaylists() {
                try {
                    const b64 = btoa(unescape(encodeURIComponent(JSON.stringify(this.playlists))));
                    const a = document.createElement('a'); 
                    a.href = URL.createObjectURL(new Blob([b64], {type:'text/plain'}));
                    a.download = 'kotorilab_playlists.txt'; a.click();
                } catch(e) { alert('エクスポートに失敗しました。'); }
            },
            triggerImport() { document.getElementById('import-file').click(); },
            handleFileImport(e) {
                const file = e.target.files[0]; if (!file) return;
                const r = new FileReader(); 
                r.onload = (ev) => {
                    try { 
                        this.playlists = JSON.parse(decodeURIComponent(escape(atob(ev.target.result)))); 
                        this.saveData(); alert('プレイリストを復元しました。'); 
                    } catch(err) { alert('ファイルの形式が正しくありません。'); }
                    e.target.value = ''; // Reset input
                }; 
                r.readAsText(file);
            },

            // 🔍 検索 (oEmbed API活用)
            async searchVideo() {
                if (!this.searchQuery) return;
                const match = this.searchQuery.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/);
                if (!match) return alert('YouTubeのURLが正しくありません。');
                const vid = match[1];
                try {
                    const res = await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${vid}&format=json`);
                    const d = await res.json();
                    this.searchResult = { id: vid, title: d.title, thumb: `https://img.youtube.com/vi/${vid}/mqdefault.jpg`, duration: '' };
                } catch(e) {
                    this.searchResult = { id: vid, title: 'YouTube Video (' + vid + ')', thumb: `https://img.youtube.com/vi/${vid}/mqdefault.jpg`, duration: '' };
                }
                setTimeout(() => lucide.createIcons(), 50);
            },

            // 📁 プレイリスト操作
            createPlaylist() { if(!this.newPlaylistName.trim()) return; this.playlists.push({id:Date.now().toString(), name:this.newPlaylistName, videos:[]}); this.newPlaylistName=''; this.saveData(); },
            deletePlaylist(id) { if(confirm('プレイリストを削除しますか？')) { this.playlists = this.playlists.filter(p=>p.id!==id); this.saveData(); } },
            startEditPlaylist(pl) { this.editingPlaylistId = pl.id; this.editingName = pl.name; },
            savePlaylistName(id) {
                const pl = this.playlists.find(p=>p.id===id);
                if(pl && this.editingName.trim()) pl.name = this.editingName;
                this.editingPlaylistId = null; this.saveData();
            },
            addToPlaylist(plId, video) { const pl = this.playlists.find(p=>p.id===plId); if(pl){ pl.videos.push({...video}); this.saveData(); alert(`「${pl.name}」に追加しました`); } },
            removeVideo(plId, idx) { const pl = this.playlists.find(p=>p.id===plId); if(pl){ pl.videos.splice(idx,1); this.saveData(); } },
            moveVideo(plId, idx, direction) {
                const pl = this.playlists.find(p => p.id === plId);
                if (pl) {
                    const newIndex = idx + direction;
                    if (newIndex >= 0 && newIndex < pl.videos.length) {
                        [pl.videos[idx], pl.videos[newIndex]] = [pl.videos[newIndex], pl.videos[idx]];
                        this.saveData();
                    }
                }
            },

            // ▶️ 再生制御
            playNow(video, plId = null) {
                if(!ytPlayer) return;
                if(this.nowPlaying?.id === video.id) { this.togglePlay(); return; }
                this.nowPlaying = video; this.currentPlaylistId = plId;
                this.progress = 0; this.currentTimeStr = '0:00';
                ytPlayer.loadVideoById(video.id);
                
                // 自動再生ポリシー対策: 初回クリックでダミー動画を起動
                this.syncPhantomVideo(true);
                setTimeout(() => lucide.createIcons(), 50);
            },
            togglePlay() {
                if(!ytPlayer || !this.nowPlaying) return;
                if(this.isPlaying) { ytPlayer.pauseVideo(); }
                else { ytPlayer.playVideo(); this.syncPhantomVideo(true); }
            },
            toggleLoop() { this.repeatMode = (this.repeatMode + 1) % 3; setTimeout(()=>lucide.createIcons(),50); },
            playPlaylist(plId) { const pl = this.playlists.find(p=>p.id===plId); if(pl && pl.videos.length>0) this.playNow(pl.videos[0], plId); },
            skipNext() {
                if(!this.currentPlaylistId || !this.nowPlaying) return;
                const pl = this.playlists.find(p=>p.id===this.currentPlaylistId);
                if(pl) {
                    const idx = pl.videos.findIndex(v=>v.id===this.nowPlaying.id);
                    if(idx !== -1) {
                        if(idx < pl.videos.length - 1) this.playNow(pl.videos[idx+1], this.currentPlaylistId);
                        else if(this.repeatMode === 2) this.playNow(pl.videos[0], this.currentPlaylistId);
                    }
                }
            },

            // ⏱️ シーク・時間管理
            startProgressTracker() {
                clearInterval(progressTimer);
                progressTimer = setInterval(() => {
                    if(ytPlayer && this.isPlaying && !this.isDragging) {
                        const cur = ytPlayer.getCurrentTime() || 0; 
                        const dur = ytPlayer.getDuration() || 1;
                        this.progress = (cur/dur)*100; 
                        this.currentTimeStr = this.formatTime(cur);
                    }
                }, 1000);
            },
            seekTo(pct) {
                if(!ytPlayer) return; 
                const dur = ytPlayer.getDuration();
                const target = (pct/100)*dur; 
                ytPlayer.seekTo(target, true);
                this.currentTimeStr = this.formatTime(target); 
                this.progress = pct;
            },
            formatTime(s) { const m = Math.floor(s/60); const sec = Math.floor(s%60); return `${m}:${sec.toString().padStart(2,'0')}`; },
            updateVideoDuration() {
                if (!ytPlayer || !this.nowPlaying) return;
                const dur = ytPlayer.getDuration();
                if(dur > 0 && !this.nowPlaying.duration) { 
                    const t = this.formatTime(dur);
                    this.nowPlaying.duration = t; 
                    if(this.searchResult && this.searchResult.id === this.nowPlaying.id) this.searchResult.duration = t;
                    this.playlists.forEach(pl => pl.videos.forEach(v => { if(v.id === this.nowPlaying.id && !v.duration) v.duration = t; }));
                    this.saveData(); 
                }
            },

            // 📱 MediaSession API (通知バー完全連携)
            setupMediaSession(video) {
                if ('mediaSession' in navigator && video) {
                    navigator.mediaSession.metadata = new MediaMetadata({
                        title: video.title, 
                        artist: '小鳥Lab BGM Player',
                        artwork: [{ src: video.thumb, sizes: '512x512', type: 'image/jpeg' }]
                    });
                    this.updateMediaSessionState();
                    
                    navigator.mediaSession.setActionHandler('play', () => this.togglePlay());
                    navigator.mediaSession.setActionHandler('pause', () => this.togglePlay());
                    // 通知バーに「次へ」ボタンを出力し、連動させる
                    navigator.mediaSession.setActionHandler('nexttrack', () => this.skipNext());
                    
                    navigator.mediaSession.setActionHandler('previoustrack', () => {
                        const pl = this.playlists.find(p=>p.id===this.currentPlaylistId);
                        if(pl) {
                            const idx = pl.videos.findIndex(v=>v.id===this.nowPlaying.id);
                            if(idx > 0) this.playNow(pl.videos[idx-1], this.currentPlaylistId);
                        }
                    });
                    navigator.mediaSession.setActionHandler('seekto', (d) => { if(d.seekTime && ytPlayer) ytPlayer.seekTo(d.seekTime, true); });
                }
            },
            updateMediaSessionState() {
                if ('mediaSession' in navigator) {
                    navigator.mediaSession.playbackState = this.isPlaying ? "playing" : "paused";
                }
            }
        }
    }
    </script>
