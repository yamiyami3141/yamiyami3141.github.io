<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小鳥Lab - Background Player</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎵</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&display=swap');
        [x-cloak] { display: none !important; }
        body { 
            font-family: 'Shippori Mincho', serif; 
            background-color: #f8f7f4;
            background-image: url('https://www.transparenttextures.com/patterns/handmade-paper.png');
            overflow-y: auto;
        }
        .animation-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .writing-vertical { writing-mode: vertical-rl; }
        .animate-in { animation: fade-in 1.2s ease-out forwards; }
        @keyframes fade-in { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 隠しプレイヤー (通信量・描画リソース削減用) */
        #hidden-player-container {
            position: absolute;
            top: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body class="select-none bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-rose-50 via-stone-100 to-orange-50 min-h-screen flex flex-col items-center justify-center p-4 text-stone-700 antialiased relative">

    <canvas class="animation-canvas"></canvas>

    <div id="hidden-player-container"><div id="youtube-player"></div></div>

    <div class="relative z-10 w-full max-w-4xl my-10 bg-white/70 backdrop-blur-3xl border border-white rounded-[2rem] shadow-2xl shadow-rose-200/30 overflow-hidden flex flex-col md:flex-row animate-in" 
        x-data="musicPlayerApp()">
        
        <div class="md:w-1/3 p-8 flex flex-col border-b md:border-b-0 md:border-r border-stone-200 relative bg-gradient-to-b from-rose-100/40 to-white/20">
            <div class="absolute top-0 right-4 p-8 opacity-10 text-4xl font-bold writing-vertical tracking-[0.6em] text-stone-900 pointer-events-none">背景再生</div>
            
            <div class="relative mb-8">
                <div class="inline-block px-4 py-1.5 bg-rose-400 text-white text-[10px] tracking-[0.2em] mb-4 rounded-full font-sans font-bold shadow-md shadow-rose-200">PLAYER</div>
                <h2 class="text-2xl font-bold tracking-widest text-stone-800 leading-tight">小鳥Lab<br>BGM Player</h2>
            </div>
            
            <div class="space-y-3 relative z-10">
                <button @click="currentTab = 'search'" :class="currentTab === 'search' ? 'bg-white shadow-sm text-rose-500' : 'hover:bg-white/50 text-stone-600'" class="w-full flex items-center gap-3 p-3 rounded-xl transition-all">
                    <i data-lucide="search" class="w-5 h-5"></i> <span class="font-bold tracking-wider text-sm">検索・追加</span>
                </button>
                <button @click="currentTab = 'playlists'" :class="currentTab === 'playlists' ? 'bg-white shadow-sm text-rose-500' : 'hover:bg-white/50 text-stone-600'" class="w-full flex items-center gap-3 p-3 rounded-xl transition-all">
                    <i data-lucide="list-music" class="w-5 h-5"></i> <span class="font-bold tracking-wider text-sm">プレイリスト</span>
                </button>
            </div>

            <div x-show="nowPlaying" x-transition class="mt-auto pt-8">
                <p class="text-[10px] tracking-[0.2em] text-stone-400 mb-2 font-bold">NOW PLAYING</p>
                <div class="bg-white/60 p-3 rounded-xl shadow-sm border border-white flex flex-col gap-2">
                    <div class="text-xs font-bold text-stone-700 truncate" x-text="nowPlaying?.title"></div>
                    <div class="flex justify-between items-center text-rose-400">
                        <button @click="togglePlay()"><i :data-lucide="isPlaying ? 'pause' : 'play'" class="w-5 h-5"></i></button>
                        <button @click="toggleLoop()" :class="isLooping ? 'text-rose-500' : 'text-stone-300'"><i data-lucide="repeat" class="w-4 h-4"></i></button>
                        <button @click="skipNext()"><i data-lucide="skip-forward" class="w-5 h-5"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <div class="md:w-2/3 p-6 sm:p-10 relative bg-white/10 h-[600px] overflow-y-auto">
            
            <div x-show="currentTab === 'search'" x-transition.opacity.duration.300ms>
                <div class="flex items-center gap-2 border-b border-rose-200 pb-2 mb-6">
                    <span class="text-rose-400 font-bold text-xl">01.</span>
                    <h3 class="font-bold text-stone-700">URLから動画を追加</h3>
                </div>
                
                <div class="flex gap-2 mb-8">
                    <input type="text" x-model="searchQuery" @keydown.enter="searchVideo" placeholder="YouTubeのURLを入力..." 
                           class="flex-1 bg-white/50 border border-stone-200 rounded-xl px-4 py-3 outline-none focus:border-rose-300 focus:bg-white transition-colors text-sm">
                    <button @click="searchVideo" class="px-6 py-3 bg-rose-400 text-white rounded-xl shadow-md hover:bg-rose-500 transition-colors">
                        <i data-lucide="search" class="w-4 h-4"></i>
                    </button>
                </div>

                <div x-show="searchResult" class="bg-white/80 p-4 rounded-2xl shadow-sm border border-rose-50">
                    <p class="text-[10px] text-stone-400 tracking-widest mb-2">RESULT</p>
                    <div class="flex items-center justify-between gap-4">
                        <div class="flex items-center gap-4 flex-1">
                            <img :src="searchResult?.thumb" class="w-24 h-16 object-cover rounded-lg shadow-sm">
                            <div>
                                <p class="text-sm font-bold text-stone-700 line-clamp-1" x-text="searchResult?.title"></p>
                                <p class="text-xs text-stone-400 font-sans" x-text="searchResult?.duration"></p>
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            <button @click="playNow(searchResult)" class="w-10 h-10 rounded-full bg-rose-50 text-rose-500 flex items-center justify-center hover:bg-rose-100 transition">
                                <i :data-lucide="(isPlaying && nowPlaying?.id === searchResult?.id) ? 'square' : 'play'" class="w-4 h-4"></i>
                            </button>
                            <button @click="toggleLoop()" :class="isLooping ? 'bg-rose-500 text-white' : 'bg-stone-50 text-stone-400'" class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-rose-100 hover:text-rose-500 transition">
                                <i data-lucide="repeat" class="w-4 h-4"></i>
                            </button>
                            <div class="relative">
                                <button @click="showPlaylistSelector = !showPlaylistSelector" class="w-10 h-10 rounded-full bg-stone-50 text-stone-500 flex items-center justify-center hover:bg-stone-200 transition">
                                    <i data-lucide="plus" class="w-4 h-4"></i>
                                </button>
                                <div x-show="showPlaylistSelector" @click.away="showPlaylistSelector = false" class="absolute right-0 mt-2 w-48 bg-white border border-stone-100 rounded-xl shadow-xl z-20 py-2">
                                    <p class="text-[10px] text-stone-400 px-4 pb-2 border-b">追加先を選択</p>
                                    <template x-for="pl in playlists" :key="pl.id">
                                        <button @click="addToPlaylist(pl.id, searchResult); showPlaylistSelector = false" class="w-full text-left px-4 py-2 text-sm text-stone-600 hover:bg-rose-50 hover:text-rose-500 transition" x-text="pl.name"></button>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div x-show="currentTab === 'playlists'" x-transition.opacity.duration.300ms>
                <div class="flex items-center gap-2 border-b border-rose-200 pb-2 mb-6">
                    <span class="text-rose-400 font-bold text-xl">02.</span>
                    <h3 class="font-bold text-stone-700">プレイリスト管理</h3>
                </div>

                <div class="flex gap-2 mb-6">
                    <input type="text" x-model="newPlaylistName" placeholder="新しいプレイリスト名..." 
                           class="flex-1 bg-white/50 border border-stone-200 rounded-xl px-4 py-2 outline-none focus:border-rose-300 text-sm">
                    <button @click="createPlaylist" class="px-4 py-2 bg-stone-600 text-white rounded-xl shadow hover:bg-stone-700 transition text-sm whitespace-nowrap">
                        作成
                    </button>
                </div>

                <div class="space-y-4">
                    <template x-for="pl in playlists" :key="pl.id">
                        <div class="bg-white/60 rounded-xl border border-white shadow-sm overflow-hidden">
                            <div class="p-4 flex justify-between items-center bg-white/40 cursor-pointer" @click="activePlaylistId = activePlaylistId === pl.id ? null : pl.id">
                                <div class="flex items-center gap-2">
                                    <i data-lucide="folder" class="w-4 h-4 text-rose-400"></i>
                                    <span class="font-bold text-stone-700" x-text="pl.name"></span>
                                    <span class="text-xs text-stone-400 ml-2" x-text="pl.videos.length + '曲'"></span>
                                </div>
                                <div class="flex gap-2">
                                    <button @click.stop="playPlaylist(pl.id)" class="text-rose-400 p-1 hover:bg-rose-50 rounded"><i data-lucide="play-circle" class="w-5 h-5"></i></button>
                                    <button @click.stop="deletePlaylist(pl.id)" class="text-stone-300 p-1 hover:bg-red-50 hover:text-red-400 rounded"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                </div>
                            </div>
                            
                            <div x-show="activePlaylistId === pl.id" class="p-2 border-t border-stone-100 bg-stone-50/50 space-y-2">
                                <p x-show="pl.videos.length === 0" class="text-xs text-stone-400 text-center py-4">動画がありません</p>
                                <template x-for="(video, index) in pl.videos" :key="video.id + index">
                                    <div :class="(nowPlaying?.id === video.id) ? 'bg-rose-100/50 border-rose-200' : 'bg-white border-transparent'" class="flex items-center justify-between p-2 rounded-lg border shadow-sm transition">
                                        
                                        <div class="relative w-20 h-14 rounded overflow-hidden flex-shrink-0">
                                            <img :src="video.thumb" class="w-full h-full object-cover">
                                            <div class="absolute inset-0 bg-black/40 flex items-center justify-center text-white text-[10px] font-mono tracking-wider" x-text="video.duration"></div>
                                        </div>
                                        
                                        <div class="flex-1 px-3 min-w-0">
                                            <p class="text-xs font-bold text-stone-700 truncate" x-text="video.title"></p>
                                        </div>

                                        <div class="flex items-center gap-1">
                                            <button @click="playNow(video, pl.id)" class="w-8 h-8 rounded-full flex items-center justify-center text-stone-500 hover:bg-stone-100 transition">
                                                <i :data-lucide="(isPlaying && nowPlaying?.id === video.id) ? 'square' : 'play'" class="w-4 h-4"></i>
                                            </button>
                                            <button @click="toggleLoop()" :class="isLooping ? 'text-rose-500' : 'text-stone-300'" class="w-8 h-8 rounded-full flex items-center justify-center hover:bg-stone-100 transition">
                                                <i data-lucide="repeat" class="w-3 h-3"></i>
                                            </button>
                                            <button @click="skipNext()" class="w-8 h-8 rounded-full flex items-center justify-center text-stone-400 hover:text-stone-600 hover:bg-stone-100 transition">
                                                <i data-lucide="skip-forward" class="w-3 h-3"></i>
                                            </button>
                                            
                                            <div class="w-px h-4 bg-stone-200 mx-1"></div>
                                            
                                            <div class="flex flex-col gap-1">
                                                <button @click="moveVideo(pl.id, index, -1)" :disabled="index === 0" class="text-stone-300 hover:text-stone-600 disabled:opacity-20"><i data-lucide="chevron-up" class="w-3 h-3"></i></button>
                                                <button @click="moveVideo(pl.id, index, 1)" :disabled="index === pl.videos.length - 1" class="text-stone-300 hover:text-stone-600 disabled:opacity-20"><i data-lucide="chevron-down" class="w-3 h-3"></i></button>
                                            </div>
                                            <button @click="removeVideo(pl.id, index)" class="w-6 h-6 ml-1 text-stone-300 hover:text-red-400 transition"><i data-lucide="x" class="w-3 h-3"></i></button>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </div>

    <script>
    // 桜アニメーション (元のコードを踏襲)
    class SakuraAnimation {
        constructor(canvas) {
            this.canvas = canvas; this.ctx = canvas.getContext('2d'); this.petals = [];
            this.resize(); window.addEventListener('resize', () => this.resize());
            this.init(); this.animate();
        }
        resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; }
        init() {
            for (let i = 0; i < 40; i++) {
                this.petals.push({
                    x: Math.random() * this.canvas.width, y: Math.random() * this.canvas.height,
                    size: Math.random() * 6 + 8, speed: Math.random() * 0.5 + 0.2,
                    wind: Math.random() * 0.4 - 0.2, angle: Math.random() * 360,
                    rotateSpeed: Math.random() * 0.8 - 0.4, flip: Math.random() * Math.PI,
                    flipSpeed: Math.random() * 0.03 + 0.01,
                    color: `rgba(255, ${215 + Math.random() * 25}, ${225 + Math.random() * 20}, ${0.5 + Math.random() * 0.3})`
                });
            }
        }
        drawPetal(p) {
            const { ctx } = this; ctx.save();
            ctx.translate(p.x, p.y); ctx.rotate(p.angle * Math.PI / 180); ctx.scale(Math.cos(p.flip), 1);
            ctx.beginPath(); ctx.fillStyle = p.color; const s = p.size;
            ctx.moveTo(0, 0); ctx.bezierCurveTo(-s * 0.4, -s * 0.5, -s * 1.2, -s * 1.1, -s * 0.4, -s * 2.0);
            ctx.lineTo(0, -s * 1.5); ctx.lineTo(s * 0.4, -s * 2.0);
            ctx.bezierCurveTo(s * 1.2, -s * 1.1, s * 0.4, -s * 0.5, 0, 0);
            ctx.fill(); ctx.restore();
        }
        animate() {
            this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
            this.petals.forEach(p => {
                p.y += p.speed; p.x += p.wind; p.angle += p.rotateSpeed; p.flip += p.flipSpeed;
                if (p.y > this.canvas.height + 40) { p.y = -40; p.x = Math.random() * this.canvas.width; }
                this.drawPetal(p);
            });
            requestAnimationFrame(() => this.animate());
        }
    }

    // YouTube IFrame API グローバルコールバック
    let ytPlayer = null;
    function onYouTubeIframeAPIReady() {
        ytPlayer = new YT.Player('youtube-player', {
            height: '1', width: '1', videoId: '',
            playerVars: { 'autoplay': 0, 'controls': 0, 'disablekb': 1, 'fs': 0, 'playsinline': 1 },
            events: {
                'onReady': onPlayerReady,
                'onStateChange': onPlayerStateChange
            }
        });
    }
    function onPlayerReady(event) {
        // 画質を最低に設定して通信量削減
        event.target.setPlaybackQuality('small');
        window.dispatchEvent(new CustomEvent('yt-ready'));
    }
    function onPlayerStateChange(event) {
        window.dispatchEvent(new CustomEvent('yt-state-change', { detail: event.data }));
    }

    // Alpine.js アプリケーションロジック
    function musicPlayerApp() {
        return {
            currentTab: 'playlists',
            searchQuery: '',
            searchResult: null,
            showPlaylistSelector: false,
            
            playlists: [],
            newPlaylistName: '',
            activePlaylistId: null,
            
            nowPlaying: null,
            isPlaying: false,
            isLooping: false,
            currentPlayingPlaylistId: null,

            init() {
                // Lucideアイコンの初期化
                setTimeout(() => lucide.createIcons(), 100);
                new SakuraAnimation(document.querySelector('.animation-canvas'));
                
                // ローカルストレージからデータ復元
                const saved = localStorage.getItem('kotori_playlists');
                if (saved) {
                    this.playlists = JSON.parse(saved);
                } else {
                    this.playlists = [{ id: 'default', name: 'お気に入り', videos: [] }];
                    this.saveData();
                }

                // YouTubeプレイヤーステートの監視
                window.addEventListener('yt-state-change', (e) => {
                    const state = e.detail;
                    if (state === YT.PlayerState.PLAYING) {
                        this.isPlaying = true;
                        lucide.createIcons();
                    } else if (state === YT.PlayerState.PAUSED || state === YT.PlayerState.ENDED) {
                        this.isPlaying = false;
                        if (state === YT.PlayerState.ENDED) {
                            if (this.isLooping) {
                                ytPlayer.seekTo(0);
                                ytPlayer.playVideo();
                            } else {
                                this.skipNext();
                            }
                        }
                        lucide.createIcons();
                    }
                });
            },

            saveData() {
                localStorage.setItem('kotori_playlists', JSON.stringify(this.playlists));
            },

            // URLからIDを抽出してモックデータを生成
            searchVideo() {
                if (!this.searchQuery) return;
                const match = this.searchQuery.match(/(?:v=|\/)([0-9A-Za-z_-]{11}).*/);
                if (match && match[1]) {
                    const vid = match[1];
                    this.searchResult = {
                        id: vid,
                        title: "YouTube Video (" + vid + ")", // ※APIなしのためタイトルは固定
                        thumb: `https://img.youtube.com/vi/${vid}/mqdefault.jpg`,
                        duration: "00:00" // ※APIなしのため時間はダミー
                    };
                    setTimeout(() => lucide.createIcons(), 50);
                } else {
                    alert('有効なYouTubeのURLを入力してください。');
                }
            },

            // プレイリスト管理
            createPlaylist() {
                if (!this.newPlaylistName.trim()) return;
                this.playlists.push({
                    id: Date.now().toString(),
                    name: this.newPlaylistName,
                    videos: []
                });
                this.newPlaylistName = '';
                this.saveData();
            },
            deletePlaylist(id) {
                if(confirm('プレイリストを削除しますか？')) {
                    this.playlists = this.playlists.filter(p => p.id !== id);
                    this.saveData();
                }
            },
            addToPlaylist(playlistId, video) {
                const pl = this.playlists.find(p => p.id === playlistId);
                if (pl) {
                    pl.videos.push({ ...video });
                    this.saveData();
                    alert(`「${pl.name}」に追加しました`);
                }
            },
            removeVideo(playlistId, index) {
                const pl = this.playlists.find(p => p.id === playlistId);
                if (pl) {
                    pl.videos.splice(index, 1);
                    this.saveData();
                }
            },
            moveVideo(playlistId, index, direction) {
                const pl = this.playlists.find(p => p.id === playlistId);
                if (pl) {
                    const newIndex = index + direction;
                    if (newIndex >= 0 && newIndex < pl.videos.length) {
                        const temp = pl.videos[index];
                        pl.videos[index] = pl.videos[newIndex];
                        pl.videos[newIndex] = temp;
                        this.saveData();
                    }
                }
            },

            // 再生制御
            playNow(video, playlistId = null) {
                if (this.nowPlaying?.id === video.id && this.isPlaying) {
                    ytPlayer.pauseVideo();
                    return;
                }
                
                this.nowPlaying = video;
                this.currentPlayingPlaylistId = playlistId;
                
                if (ytPlayer && ytPlayer.loadVideoById) {
                    ytPlayer.loadVideoById(video.id);
                    this.isPlaying = true;
                    this.setupMediaSession(video);
                }
                setTimeout(() => lucide.createIcons(), 50);
            },
            
            togglePlay() {
                if (!ytPlayer) return;
                if (this.isPlaying) {
                    ytPlayer.pauseVideo();
                } else {
                    ytPlayer.playVideo();
                }
            },
            
            toggleLoop() {
                this.isLooping = !this.isLooping;
                setTimeout(() => lucide.createIcons(), 50);
            },

            playPlaylist(playlistId) {
                const pl = this.playlists.find(p => p.id === playlistId);
                if (pl && pl.videos.length > 0) {
                    this.playNow(pl.videos[0], playlistId);
                }
            },

            skipNext() {
                if (!this.currentPlayingPlaylistId) return;
                const pl = this.playlists.find(p => p.id === this.currentPlayingPlaylistId);
                if (pl) {
                    const currentIndex = pl.videos.findIndex(v => v.id === this.nowPlaying.id);
                    if (currentIndex !== -1 && currentIndex < pl.videos.length - 1) {
                        this.playNow(pl.videos[currentIndex + 1], this.currentPlayingPlaylistId);
                    }
                }
            },

            // ロック画面・ステータスバー連携 (Media Session API)
            setupMediaSession(video) {
                if ('mediaSession' in navigator) {
                    navigator.mediaSession.metadata = new MediaMetadata({
                        title: video.title,
                        artist: '小鳥Lab Background Player',
                        artwork: [
                            { src: video.thumb, sizes: '320x180', type: 'image/jpeg' },
                            { src: video.thumb.replace('mqdefault', 'maxresdefault'), sizes: '1280x720', type: 'image/jpeg' }
                        ]
                    });

                    navigator.mediaSession.setActionHandler('play', () => this.togglePlay());
                    navigator.mediaSession.setActionHandler('pause', () => this.togglePlay());
                    navigator.mediaSession.setActionHandler('nexttrack', () => this.skipNext());
                }
            }
        }
    }
    </script>
</body>
</html>
