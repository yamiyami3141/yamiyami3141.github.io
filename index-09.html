<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小鳥Lab - Background Player Pro</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎵</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&display=swap');
        [x-cloak] { display: none !important; }
        
        html { scrollbar-width: thin; scrollbar-color: rgba(244, 63, 94, 0.4) transparent; }

        body { 
            font-family: 'Shippori Mincho', serif; 
            background-color: #f8f7f4;
            background-image: url('https://www.transparenttextures.com/patterns/handmade-paper.png');
            overflow: hidden; 
            width: 100vw; height: 100dvh;
            margin: 0; padding: 0;
            touch-action: manipulation; /* モバイルでのズーム誤爆防止 */
        }
        
        .animation-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .writing-vertical { writing-mode: vertical-rl; }
        
        /* * ★ 専門家デバッグによるFirefox完全対策クラス ★
         * 完全に画面外(-9999px)にするとプロセスが止められるため、
         * 画面右下に1x1pxで配置し、不透明度0.01で「見えている」と偽装する
         */
        .phantom-media-container {
            position: fixed;
            bottom: 1px; right: 1px;
            width: 1px; height: 1px;
            opacity: 0.01;
            z-index: 9999;
            pointer-events: none;
            overflow: hidden;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(244, 63, 94, 0.2); border-radius: 10px; }
    </style>
</head>
<body class="select-none bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-rose-50 via-stone-100 to-orange-50 flex items-center justify-center p-2 sm:p-4 text-stone-700 antialiased relative box-border">

    <canvas class="animation-canvas"></canvas>

    <div class="phantom-media-container">
        <video id="phantom-mp4-video" loop playsinline muted preload="auto">
            <source src="data:video/mp4;base64,AAAAIGZ0eXBpc29tAAACAGlzb21pbmYxbXA0MgADOG1vb3YAAABsbXZoZAAAAADR6S8X0ekvFwAAA+gAAAAAAAEAAAEAAAAAAAAAAAAAAAABAAAAAAAAAAAAAAAAAAAAAQAAAAAAAAAAAAAAAAAAQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAIAAABidHJha2sAAABcdGtoZAAAAADR6S8X0ekvFwAAAAEAAAAAAAABAAAAAAAAAAAAAAAAAQAAAAAAAAAAAAAAAAAAQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAIAAABtZWRpYQAAACBtZGhkAAAAANHpLxfR6S8XAAA+gAAAAABVxAAAAAAALWhkbHIAAAAAAAAAAHZpZGUAAAAAAAAAAAAAAABWaWRlb0hhbmRsZXIAAAAFbWluZgAAABxtdmhkAAAAAAAQAAAAAAAAAAAAAAAAAAAAAAAkZGluZgAAABxkcmVmAAAAAAAAAAEAAAAMdXJsIAAAAAEAAABNc3RibAAAADtzdHNkAAAAAAAAAAEAAAArYXZjMQAAAAAAAAABAAAAAAAAAAAAAAAAAAAAAAAIAAgAEAAAAAAAEAAhbm9uZQAAAAAAAAAAAB9mcmVlAAAAGW1kYXQ=" type="video/mp4">
        </video>
        <div id="youtube-player"></div>
    </div>

    <div class="relative z-10 w-full max-w-5xl bg-white/80 backdrop-blur-3xl border border-white rounded-3xl shadow-2xl shadow-rose-200/30 flex flex-col md:flex-row h-[96dvh] md:h-[85vh] overflow-hidden box-border" 
        x-data="musicPlayerApp()">
        
        <input type="file" id="import-file" class="hidden" @change="handleFileImport($event)" accept=".txt">

        <div class="md:w-1/3 p-4 sm:p-8 flex flex-col border-b md:border-b-0 md:border-r border-stone-200 relative bg-gradient-to-b from-rose-100/40 to-white/20 shrink-0 box-border">
            <div class="absolute top-0 right-4 p-8 opacity-10 text-4xl font-bold writing-vertical tracking-[0.6em] text-stone-900 pointer-events-none hidden md:block">背景再生</div>
            
            <div class="relative mb-4 md:mb-6">
                <div class="inline-block px-3 py-1 bg-rose-400 text-white text-[10px] tracking-[0.2em] mb-2 md:mb-3 rounded-full font-sans font-bold shadow-md">PLAYER</div>
                <h2 class="text-xl sm:text-2xl font-bold tracking-widest text-stone-800 leading-tight">小鳥Lab<br>BGM Player</h2>
            </div>
            
            <div class="space-y-2 relative z-10 flex md:flex-col gap-2 md:gap-0 w-full">
                <button @click="currentTab = 'search'" :class="currentTab === 'search' ? 'bg-white shadow-sm text-rose-500' : 'hover:bg-white/50 text-stone-600'" class="flex-1 md:w-full flex items-center justify-center md:justify-start gap-2 md:gap-3 p-3 rounded-xl transition-all">
                    <i data-lucide="search" class="w-4 h-4 md:w-5 md:h-5"></i> <span class="font-bold tracking-wider text-xs md:text-sm">検索・追加</span>
                </button>
                <button @click="currentTab = 'playlists'" :class="currentTab === 'playlists' ? 'bg-white shadow-sm text-rose-500' : 'hover:bg-white/50 text-stone-600'" class="flex-1 md:w-full flex items-center justify-center md:justify-start gap-2 md:gap-3 p-3 rounded-xl transition-all">
                    <i data-lucide="list-music" class="w-4 h-4 md:w-5 md:h-5"></i> <span class="font-bold tracking-wider text-xs md:text-sm">リスト管理</span>
                </button>
            </div>

            <div x-show="nowPlaying" class="mt-auto pt-6 hidden md:block" x-transition>
                <p class="text-[10px] tracking-[0.2em] text-stone-400 mb-2 font-bold">NOW PLAYING</p>
                <div class="bg-white/80 p-3 rounded-2xl shadow-sm border border-white flex flex-col gap-3 relative overflow-hidden">
                    
                    <div class="absolute bottom-0 left-0 w-full h-1.5 bg-rose-400/20 group cursor-pointer">
                        <div class="absolute top-0 left-0 h-full bg-rose-500 transition-all duration-300 pointer-events-none" :style="`width: ${progress}%`"></div>
                        <input type="range" min="0" max="100" step="0.1" :value="progress" 
                               @input="seekTo($event.target.value)" 
                               @mousedown="isDragging = true" @mouseup="isDragging = false" 
                               class="absolute top-0 left-0 w-full h-full opacity-0 cursor-pointer z-10 m-0 p-0">
                    </div>
                    
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 rounded-lg overflow-hidden shrink-0 relative">
                            <img :src="nowPlaying?.thumb" class="w-full h-full object-cover">
                        </div>
                        <div class="min-w-0 flex-1">
                            <div class="text-xs font-bold text-stone-700 truncate" x-text="nowPlaying?.title"></div>
                            <div class="text-[10px] text-stone-400 font-mono mt-1" x-text="currentTimeStr + ' / ' + (nowPlaying?.duration || '--:--')"></div>
                        </div>
                    </div>
                    
                    <div class="flex justify-between items-center text-stone-500 px-2 pb-1">
                        <button @click="toggleLoop()" :class="repeatMode > 0 ? 'text-rose-500 bg-rose-50' : 'hover:bg-stone-100 text-stone-400'" class="w-8 h-8 rounded-full transition flex items-center justify-center relative">
                            <i :data-lucide="repeatMode === 1 ? 'repeat-1' : 'repeat'" class="w-4 h-4"></i>
                            <span x-show="repeatMode === 2" class="absolute -top-1 -right-1 text-[8px] font-bold bg-rose-500 text-white w-3.5 h-3.5 rounded-full flex items-center justify-center shadow-sm">A</span>
                        </button>
                        
                        <button @click="togglePlay()" class="w-10 h-10 bg-rose-500 text-white rounded-full flex items-center justify-center shadow-md hover:scale-105 transition">
                            <i :data-lucide="isPlaying ? 'pause' : 'play'" class="w-5 h-5 ml-0.5"></i>
                        </button>
                        <button @click="skipNext()" class="w-8 h-8 rounded-full hover:bg-stone-100 transition flex items-center justify-center text-stone-400 hover:text-stone-600"><i data-lucide="skip-forward" class="w-4 h-4"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex-1 p-4 sm:p-8 relative bg-white/10 overflow-y-auto overflow-x-hidden flex flex-col box-border pb-28 md:pb-8">
            
            <div x-show="currentTab === 'search'" x-transition.opacity.duration.300ms class="flex-1 w-full max-w-full">
                <div class="flex items-center gap-2 border-b border-rose-200 pb-2 mb-6 w-full">
                    <span class="text-rose-400 font-bold text-xl shrink-0">01.</span>
                    <h3 class="font-bold text-stone-700 truncate">URLから検索・追加</h3>
                </div>
                
                <div class="flex gap-2 mb-6 w-full max-w-full">
                    <input type="text" x-model="searchQuery" @keydown.enter="searchVideo" placeholder="YouTube URL..." 
                           class="flex-1 min-w-0 bg-white/60 border border-stone-200 rounded-xl px-4 py-3 outline-none focus:border-rose-300 transition-colors text-sm shadow-inner box-border">
                    <button @click="searchVideo" class="shrink-0 px-4 sm:px-6 py-3 bg-stone-700 text-white rounded-xl shadow-md hover:bg-stone-800 transition-colors flex items-center gap-2">
                        <i data-lucide="search" class="w-4 h-4"></i><span class="hidden sm:inline text-sm">検索</span>
                    </button>
                </div>

                <div x-show="searchResult" class="bg-white/80 p-4 rounded-2xl shadow-sm border border-rose-100 w-full max-w-full box-border" x-cloak>
                    <p class="text-[10px] text-rose-400 font-bold tracking-widest mb-3">RESULT</p>
                    <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 w-full">
                        <div class="flex items-center gap-4 flex-1 min-w-0 w-full">
                            <div class="relative w-28 h-16 shrink-0 rounded-lg overflow-hidden shadow-sm">
                                <img :src="searchResult?.thumb" class="w-full h-full object-cover">
                                <div class="absolute inset-0 bg-black/40 flex items-center justify-center text-white text-[10px] font-mono" x-text="searchResult?.duration || '--:--'"></div>
                            </div>
                            <div class="min-w-0 flex-1">
                                <p class="text-sm font-bold text-stone-700 line-clamp-2" x-text="searchResult?.title"></p>
                            </div>
                        </div>
                        
                        <div class="flex items-center gap-2 w-full sm:w-auto justify-end border-t sm:border-t-0 pt-3 sm:pt-0 border-stone-100 shrink-0">
                            <button @click="playNow(searchResult)" class="w-10 h-10 rounded-full bg-rose-50 text-rose-500 flex items-center justify-center hover:bg-rose-100 transition shadow-sm">
                                <i :data-lucide="(nowPlaying?.id === searchResult?.id && isPlaying) ? 'pause' : 'play'" class="w-4 h-4 ml-0.5"></i>
                            </button>
                            
                            <div class="relative">
                                <button @click="showPlaylistSelector = !showPlaylistSelector" class="w-10 h-10 rounded-full bg-stone-700 text-white flex items-center justify-center hover:bg-stone-800 transition shadow-sm">
                                    <i data-lucide="plus" class="w-4 h-4"></i>
                                </button>
                                <div x-show="showPlaylistSelector" @click.away="showPlaylistSelector = false" class="absolute right-0 top-12 w-48 bg-white border border-stone-200 rounded-xl shadow-xl z-30 py-2">
                                    <p class="text-[10px] text-stone-400 px-4 pb-2 border-b">追加先を選択</p>
                                    <template x-for="pl in playlists" :key="pl.id">
                                        <button @click="addToPlaylist(pl.id, searchResult); showPlaylistSelector = false" class="w-full text-left px-4 py-2 text-sm text-stone-600 hover:bg-rose-50 hover:text-rose-500 transition truncate" x-text="pl.name"></button>
                                    </template>
                                </div>

            <div x-show="currentTab === 'playlists'" x-transition.opacity.duration.300ms class="flex-1 w-full max-w-full">
                <div class="flex items-center justify-between border-b border-rose-200 pb-2 mb-6 w-full">
                    <div class="flex items-center gap-2 min-w-0">
                        <span class="text-rose-400 font-bold text-xl shrink-0">02.</span>
                        <h3 class="font-bold text-stone-700 truncate">プレイリスト管理</h3>
                    </div>
                    <div class="flex gap-2 shrink-0">
                        <button @click="triggerImport" class="text-[10px] font-bold tracking-widest bg-stone-100 text-stone-500 px-2 sm:px-3 py-1.5 rounded-lg hover:bg-stone-200 transition flex items-center gap-1 shadow-sm whitespace-nowrap">
                            <i data-lucide="download" class="w-3 h-3"></i> 読込
                        </button>
                        <button @click="exportPlaylists" class="text-[10px] font-bold tracking-widest bg-rose-50 text-rose-500 px-2 sm:px-3 py-1.5 rounded-lg hover:bg-rose-100 transition flex items-center gap-1 shadow-sm whitespace-nowrap">
                            <i data-lucide="upload" class="w-3 h-3"></i> 共有
                        </button>
                    </div>
                </div>

                <div class="flex gap-2 mb-6 w-full max-w-full">
                    <input type="text" x-model="newPlaylistName" @keydown.enter="createPlaylist" placeholder="新しいプレイリスト名..." 
                           class="flex-1 min-w-0 bg-white/60 border border-stone-200 rounded-xl px-4 py-2 outline-none focus:border-rose-300 text-sm shadow-inner box-border">
                    <button @click="createPlaylist" class="shrink-0 px-4 py-2 bg-stone-600 text-white rounded-xl shadow hover:bg-stone-700 transition text-sm flex items-center gap-1 whitespace-nowrap">
                        <i data-lucide="folder-plus" class="w-4 h-4"></i> 作成
                    </button>
                </div>

                <div class="space-y-4 w-full">
                    <template x-for="pl in playlists" :key="pl.id">
                        <div class="bg-white/70 rounded-2xl border border-white shadow-sm overflow-hidden transition-all w-full max-w-full">
                            
                            <div class="p-3 sm:p-4 flex justify-between items-center bg-white/50 cursor-pointer hover:bg-white/80 transition gap-2" 
                                @click="if(editingPlaylistId !== pl.id) activePlaylistId = (activePlaylistId === pl.id ? null : pl.id)">
                                
                                <div class="flex items-center gap-2 sm:gap-3 flex-1 min-w-0">
                                    <i data-lucide="folder" class="w-4 h-4 sm:w-5 sm:h-5 text-rose-400 shrink-0"></i>
                                    
                                    <template x-if="editingPlaylistId === pl.id">
                                        <input type="text" x-model="editingName" 
                                            @click.stop 
                                            @keydown.enter.stop="savePlaylistName(pl.id)" 
                                            @blur="savePlaylistName(pl.id)" 
                                            class="bg-white border border-rose-300 rounded px-2 py-1 text-sm font-bold text-stone-700 w-full outline-none" autofocus>
                                    </template>
                                    
                                    <template x-if="editingPlaylistId !== pl.id">
                                        <div class="flex items-center gap-2 flex-1 min-w-0">
                                            <span class="font-bold text-stone-700 truncate text-sm sm:text-base" x-text="pl.name"></span>
                                            <button @click.stop="startEditPlaylist(pl)" class="text-stone-300 hover:text-stone-500 shrink-0 p-1">
                                                <i data-lucide="edit-2" class="w-3 h-3"></i>
                                            </button>
                                        </div>
                                    </template>
                                </div>

                                <div class="flex items-center gap-2 sm:gap-3 shrink-0">
                                    <span class="text-[10px] sm:text-xs text-stone-400 bg-stone-100 px-2 py-1 rounded-full font-mono whitespace-nowrap" x-text="pl.videos.length + '曲'"></span>
                                    
                                    <button @click.stop="playPlaylist(pl.id)" class="text-rose-400 p-1.5 bg-rose-50 hover:bg-rose-100 rounded-full transition shadow-sm">
                                        <i data-lucide="play" class="w-4 h-4 ml-0.5"></i>
                                    </button>
                                    
                                    <button @click.stop="deletePlaylist(pl.id)" class="text-stone-400 p-1.5 hover:bg-red-50 hover:text-red-500 rounded-full transition">
                                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                                    </button>
                                </div>
                            </div>
                            
                            <div x-show="activePlaylistId === pl.id" x-collapse class="border-t border-stone-100 bg-stone-50/30 p-2 sm:p-3 space-y-2">
                                <p x-show="pl.videos.length === 0" class="text-xs text-stone-400 text-center py-6">動画が追加されていません</p>
                                
                                <template x-for="(video, index) in pl.videos" :key="video.id + index">
                                    <div :class="(nowPlaying?.id === video.id) ? 'bg-rose-50/80 border-rose-200 shadow-md scale-[1.01]' : 'bg-white border-transparent shadow-sm'" 
                                         class="flex flex-col sm:flex-row items-center justify-between p-2 rounded-xl border transition-all gap-2 w-full max-w-full box-border">
                                        
                                        <div class="flex items-center gap-3 w-full sm:w-auto flex-1 min-w-0">
                                            <div class="relative w-20 h-12 sm:w-24 sm:h-14 rounded-lg overflow-hidden shrink-0 shadow-sm">
                                                <img :src="video.thumb" class="w-full h-full object-cover">
                                                <div class="absolute inset-0 bg-black/40 flex items-center justify-center text-white text-[9px] sm:text-[10px] font-mono tracking-wider" x-text="video.duration || '--:--'"></div>
                                            </div>
                                            <div class="flex-1 min-w-0 pr-2">
                                                <p class="text-xs font-bold text-stone-700 line-clamp-2" x-text="video.title"></p>
                                            </div>
                                        </div>

                                        <div class="flex items-center justify-between sm:justify-end w-full sm:w-auto bg-stone-50 sm:bg-transparent p-1 sm:p-0 rounded-lg shrink-0 gap-1">
                                            <div class="flex items-center">
                                                <button @click="playNow(video, pl.id)" class="w-8 h-8 sm:w-9 sm:h-9 rounded-full flex items-center justify-center text-rose-500 hover:bg-rose-50 transition">
                                                    <i :data-lucide="(nowPlaying?.id === video.id && isPlaying) ? 'pause' : 'play'" class="w-4 h-4 ml-0.5"></i>
                                                </button>
                                                <button @click="skipNext()" class="w-8 h-8 sm:w-9 sm:h-9 rounded-full flex items-center justify-center text-stone-400 hover:text-stone-600 hover:bg-stone-100 transition">
                                                    <i data-lucide="skip-forward" class="w-4 h-4"></i>
                                                </button>
                                            </div>
                                            
                                            <div class="w-px h-6 bg-stone-200 mx-1 hidden sm:block"></div>
                                            
                                            <div class="flex items-center gap-1 border-l border-stone-200 sm:border-none pl-2 sm:pl-0">
                                                <div class="flex flex-col">
                                                    <button @click="moveVideo(pl.id, index, -1)" :disabled="index === 0" class="p-1 text-stone-400 hover:text-stone-700 disabled:opacity-20"><i data-lucide="chevron-up" class="w-3 h-3"></i></button>
                                                    <button @click="moveVideo(pl.id, index, 1)" :disabled="index === pl.videos.length - 1" class="p-1 text-stone-400 hover:text-stone-700 disabled:opacity-20"><i data-lucide="chevron-down" class="w-3 h-3"></i></button>
                                                </div>
                                                <button @click="removeVideo(pl.id, index)" class="p-2 text-stone-300 hover:text-red-400 hover:bg-red-50 rounded-lg transition"><i data-lucide="x" class="w-4 h-4"></i></button>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </div>

        <div x-show="nowPlaying" class="md:hidden absolute bottom-0 left-0 w-full bg-white/95 backdrop-blur-md border-t border-stone-200 p-2 sm:p-3 pt-3 flex items-center justify-between z-40 shadow-[0_-10px_30px_rgba(0,0,0,0.08)] box-border">
            
            <div class="absolute top-0 left-0 w-full h-1 bg-rose-400/20 group">
                <div class="absolute top-0 left-0 h-full bg-rose-500 pointer-events-none transition-all duration-300" :style="`width: ${progress}%`"></div>
                <input type="range" min="0" max="100" step="0.1" :value="progress" 
                       @input="seekTo($event.target.value)" 
                       @mousedown="isDragging = true" @mouseup="isDragging = false" 
                       @touchstart="isDragging = true" @touchend="isDragging = false" 
                       class="absolute top-0 left-0 w-full h-full opacity-0 cursor-pointer z-10 m-0 p-0">
            </div>

            <div class="flex items-center gap-2 sm:gap-3 flex-1 min-w-0 pr-2">
                <img :src="nowPlaying?.thumb" class="w-10 h-10 sm:w-12 sm:h-12 rounded object-cover shadow-sm shrink-0">
                <div class="min-w-0 flex-1">
                    <p class="text-[11px] sm:text-xs font-bold text-stone-800 truncate" x-text="nowPlaying?.title"></p>
                    <p class="text-[9px] sm:text-[10px] text-stone-500 font-mono mt-0.5" x-text="currentTimeStr"></p>
                </div>
            </div>
            
            <div class="flex items-center gap-1 shrink-0">
                <button @click="toggleLoop()" :class="repeatMode > 0 ? 'text-rose-500 bg-rose-50' : 'text-stone-400'" class="w-8 h-8 rounded-full flex items-center justify-center transition relative">
                    <i :data-lucide="repeatMode === 1 ? 'repeat-1' : 'repeat'" class="w-4 h-4"></i>
                    <span x-show="repeatMode === 2" class="absolute -top-1 -right-0.5 text-[7px] font-bold bg-rose-500 text-white w-3 h-3 rounded-full flex items-center justify-center">A</span>
                </button>
                <button @click="togglePlay()" class="w-10 h-10 bg-rose-500 text-white rounded-full flex items-center justify-center shadow">
                    <i :data-lucide="isPlaying ? 'pause' : 'play'" class="w-4 h-4 ml-0.5"></i>
                </button>
                <button @click="skipNext()" class="w-8 h-8 flex items-center justify-center text-stone-500 hover:text-stone-700 transition">
                    <i data-lucide="skip-forward" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
    // 🌸 桜アニメーション
    class SakuraAnimation {
        constructor(canvas) {
            this.canvas = canvas; this.ctx = canvas.getContext('2d'); this.petals = [];
            this.resize(); window.addEventListener('resize', () => this.resize());
            this.init(); this.animate();
        }
        resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; }
        init() {
            for (let i = 0; i < 50; i++) {
                this.petals.push({
                    x: Math.random() * this.canvas.width, y: Math.random() * this.canvas.height,
                    size: Math.random() * 8 + 10, speed: Math.random() * 0.7 + 0.3,
                    wind: Math.random() * 0.6 - 0.3, angle: Math.random() * 360,
                    rotateSpeed: Math.random() * 1.2 - 0.6, flip: Math.random() * Math.PI,
                    flipSpeed: Math.random() * 0.04 + 0.01,
                    color: `rgba(255, ${215 + Math.random() * 25}, ${225 + Math.random() * 20}, ${0.5 + Math.random() * 0.4})`
                });
            }
        }
        drawPetal(p) {
            const { ctx } = this; ctx.save();
            ctx.translate(p.x, p.y); ctx.rotate(p.angle * Math.PI / 180); ctx.scale(Math.cos(p.flip), 1);
            ctx.beginPath(); ctx.fillStyle = p.color; const s = p.size;
            ctx.moveTo(0, 0); ctx.bezierCurveTo(-s * 0.4, -s * 0.5, -s * 1.2, -s * 1.1, -s * 0.4, -s * 2.0);
            ctx.lineTo(0, -s * 1.5); ctx.lineTo(s * 0.4, -s * 2.0);
            ctx.bezierCurveTo(s * 1.2, -s * 1.1, s * 0.4, -s * 0.5, 0, 0);
            ctx.fill(); ctx.restore();
        }
        animate() {
            this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
            this.petals.forEach(p => {
                p.y += p.speed; p.x += p.wind; p.angle += p.rotateSpeed; p.flip += p.flipSpeed;
                if (p.y > this.canvas.height + 40) { p.y = -40; p.x = Math.random() * this.canvas.width; }
                this.drawPetal(p);
            });
            requestAnimationFrame(() => this.animate());
        }
    }

    let ytPlayer = null;
    let progressTimer = null;

    function onYouTubeIframeAPIReady() {
        ytPlayer = new YT.Player('youtube-player', {
            height: '100', width: '100', videoId: '', 
            playerVars: { 
                'autoplay': 1, 
                'controls': 0, 
                'disablekb': 1, 
                'playsinline': 1,
                'rel': 0,
                'modestbranding': 1,
                'iv_load_policy': 3,
                'origin': location.origin,
                'widget_referrer': location.href
            },
            events: {
                'onReady': (e) => {
                    e.target.setPlaybackQuality('small');
                    window.dispatchEvent(new CustomEvent('yt-ready'));
                },
                'onStateChange': (e) => {
                    const player = e.target;
                    const state = e.data;

                    // 🌸 専門家による「通知バー同期型」広告回避ロジック
                    // 広告再生中(getAdState > 0) または バッファリング中(3) の挙動を監視
                    if (state === YT.PlayerState.BUFFERING || state === YT.PlayerState.PLAYING) {
                        try {
                            if (typeof player.getAdState === 'function' && player.getAdState() > 0) {
                                // 広告を検知した場合、再生位置を強制的に 0.5秒進めて本編復帰を促す
                                player.setPlaybackQuality('small'); 
                                player.seekTo(player.getCurrentTime() + 0.5, true);
                            }
                        } catch (err) {
                            console.warn("Ad-skip handling paused.");
                        }
                    }

                    // OSの通知バー（MediaSession）に再生状態を同期
                    if ('mediaSession' in navigator) {
                        if (state === YT.PlayerState.PLAYING) {
                            navigator.mediaSession.playbackState = "playing";
                        } else if (state === YT.PlayerState.PAUSED) {
                            navigator.mediaSession.playbackState = "paused";
                        }
                    }

                    window.dispatchEvent(new CustomEvent('yt-state-change', { detail: state }));
                },
                'onError': (e) => {
                    let msg = "再生エラーが発生しました。";
                    if (e.data === 101 || e.data === 150) msg = "この動画は埋め込み再生が許可されていません。";
                    else if (e.data === 100) msg = "動画が見つからないか、削除されています。";
                    console.error("YT Error:", e.data);
                    alert(msg);
                }
            }
        });
    }

    function musicPlayerApp() {
        return {
            currentTab: 'search', 
            searchQuery: '', searchResult: null, showPlaylistSelector: false,
            
            playlists: [], newPlaylistName: '', activePlaylistId: null, editingPlaylistId: null, editingName: '',
            
            nowPlaying: null, isPlaying: false, currentPlaylistId: null, 
            progress: 0, currentTimeStr: '0:00',
            isDragging: false,
            
            // リピートモード: 0 = Off, 1 = One(1曲), 2 = All(プレイリスト全体)
            repeatMode: 0,

            init() {
                setTimeout(() => lucide.createIcons(), 100);
                new SakuraAnimation(document.querySelector('.animation-canvas'));
                
                const saved = localStorage.getItem('kotori_playlists_v5');
                if (saved) {
                    this.playlists = JSON.parse(saved);
                } else {
                    this.playlists = [{ id: Date.now().toString(), name: 'お気に入り', videos: [] }];
                    this.saveData();
                }

                window.addEventListener('yt-state-change', (e) => {
                    const state = e.detail;
                    if (state === YT.PlayerState.PLAYING) {
                        this.isPlaying = true;
                        this.updateVideoDuration(); 
                        this.startProgressTracker();
                        this.setupMediaSession(this.nowPlaying);
                        this.syncPhantomVideo(true); // ★ Firefoxバックグラウンド維持オン
                        lucide.createIcons();
                    } else if (state === YT.PlayerState.PAUSED) {
                        this.isPlaying = false;
                        clearInterval(progressTimer);
                        this.syncPhantomVideo(false); // ★ Firefoxバックグラウンド維持オフ
                        lucide.createIcons();
                    } else if (state === YT.PlayerState.ENDED) {
                        this.isPlaying = false;
                        clearInterval(progressTimer);
                        this.syncPhantomVideo(false);
                        
                        if (this.repeatMode === 1) {
                            ytPlayer.seekTo(0); ytPlayer.playVideo();
                        } else {
                            this.skipNext();
                        }
                        lucide.createIcons();
                    }
                });
            },

            saveData() { localStorage.setItem('kotori_playlists_v5', JSON.stringify(this.playlists)); },

            // ★ 解決策の実装：偽装MP4ビデオとYouTubeの同期
            syncPhantomVideo(play) {
                const dummyVideo = document.getElementById('phantom-mp4-video');
                if (!dummyVideo) return;
                if (play) {
                    dummyVideo.volume = 0.01;
                    const playPromise = dummyVideo.play();
                    if (playPromise !== undefined) {
                        playPromise.catch(error => console.warn("Phantom video blocked:", error));
                    }
                } else {
                    dummyVideo.pause();
                }
            },

            // ====== インポート・エクスポート (JSON-Base64) ======
            exportPlaylists() {
                try {
                    const jsonStr = JSON.stringify(this.playlists);
                    const base64Str = btoa(unescape(encodeURIComponent(jsonStr)));
                    const blob = new Blob([base64Str], { type: 'text/plain' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = 'kotorilab_playlists.txt'; a.click();
                    URL.revokeObjectURL(url);
                } catch(e) { alert('エクスポートに失敗しました。'); }
            },
            triggerImport() { document.getElementById('import-file').click(); },
            handleFileImport(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const jsonStr = decodeURIComponent(escape(atob(event.target.result)));
                        const parsed = JSON.parse(jsonStr);
                        if (Array.isArray(parsed)) {
                            if(confirm('現在のプレイリストを全て上書きしますか？\n（「キャンセル」で既存のリストに追加）')) {
                                this.playlists = parsed;
                            } else {
                                parsed.forEach(p => { p.id = Date.now().toString() + Math.random().toString(36).substr(2, 5); this.playlists.push(p); });
                            }
                            this.saveData(); alert('読み込みが完了しました！');
                        }
                    } catch(error) { alert('ファイルの読み込みに失敗しました。'); }
                    e.target.value = '';
                };
                reader.readAsText(file);
            },

            // ====== 検索 ======
            async searchVideo() {
                if (!this.searchQuery) return;
                const match = this.searchQuery.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/);
                if (!match) return alert('有効なYouTubeのURLを入力してください。');
                
                const vid = match[1];
                try {
                    const res = await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${vid}&format=json`);
                    const data = await res.json();
                    this.searchResult = { id: vid, title: data.title, thumb: `https://img.youtube.com/vi/${vid}/mqdefault.jpg`, duration: '' };
                } catch (e) {
                    this.searchResult = { id: vid, title: `YouTube Video (${vid})`, thumb: `https://img.youtube.com/vi/${vid}/mqdefault.jpg`, duration: '' };
                }
                setTimeout(() => lucide.createIcons(), 50);
            },

            // ====== プレイリスト管理 ======
            createPlaylist() {
                if (!this.newPlaylistName.trim()) return;
                this.playlists.push({ id: Date.now().toString(), name: this.newPlaylistName, videos: [] });
                this.newPlaylistName = ''; this.saveData();
            },
            deletePlaylist(id) {
                if(confirm('プレイリストを削除しますか？')) {
                    this.playlists = this.playlists.filter(p => p.id !== id);
                    if(this.activePlaylistId === id) this.activePlaylistId = null;
                    this.saveData();
                }
            },
            startEditPlaylist(pl) { this.editingPlaylistId = pl.id; this.editingName = pl.name; },
            savePlaylistName(id) {
                const pl = this.playlists.find(p => p.id === id);
                if (pl && this.editingName.trim()) pl.name = this.editingName;
                this.editingPlaylistId = null; this.saveData();
            },
            addToPlaylist(playlistId, video) {
                const pl = this.playlists.find(p => p.id === playlistId);
                if (pl) { pl.videos.push({ ...video }); this.saveData(); alert(`「${pl.name}」に追加しました`); }
            },
            removeVideo(playlistId, index) {
                const pl = this.playlists.find(p => p.id === playlistId);
                if (pl) { pl.videos.splice(index, 1); this.saveData(); }
            },
            moveVideo(playlistId, index, direction) {
                const pl = this.playlists.find(p => p.id === playlistId);
                if (pl) {
                    const newIndex = index + direction;
                    if (newIndex >= 0 && newIndex < pl.videos.length) {
                        [pl.videos[index], pl.videos[newIndex]] = [pl.videos[newIndex], pl.videos[index]];
                        this.saveData();
                    }
                }
            },

            // ====== 再生制御 ======
            playNow(video, playlistId = null) {
                if (!ytPlayer) return;
                if (this.nowPlaying?.id === video.id) { this.togglePlay(); return; }
                
                this.nowPlaying = video; this.currentPlaylistId = playlistId;
                this.progress = 0; this.currentTimeStr = '0:00';
                
                ytPlayer.loadVideoById(video.id);
                this.isPlaying = true; 
                
                // 初回アクションで偽装ビデオも強制起動 (自動再生ポリシー突破)
                this.syncPhantomVideo(true); 
                
                this.setupMediaSession(video);
                setTimeout(() => lucide.createIcons(), 50);
            },
            
            togglePlay() {
                if (!ytPlayer || !this.nowPlaying) return;
                if (this.isPlaying) { 
                    ytPlayer.pauseVideo(); 
                    this.syncPhantomVideo(false); 
                } else { 
                    ytPlayer.playVideo(); 
                    this.syncPhantomVideo(true); 
                }
            },

            toggleLoop() {
                this.repeatMode = (this.repeatMode + 1) % 3;
                setTimeout(() => lucide.createIcons(), 50);
            },

            playPlaylist(playlistId) {
                const pl = this.playlists.find(p => p.id === playlistId);
                if (pl && pl.videos.length > 0) this.playNow(pl.videos[0], playlistId);
            },

            skipNext() {
                if (!this.currentPlaylistId || !this.nowPlaying) return;
                const pl = this.playlists.find(p => p.id === this.currentPlaylistId);
                if (pl) {
                    const idx = pl.videos.findIndex(v => v.id === this.nowPlaying.id);
                    if (idx !== -1) {
                        if (idx < pl.videos.length - 1) {
                            this.playNow(pl.videos[idx + 1], this.currentPlaylistId);
                        } else if (this.repeatMode === 2) {
                            // プレイリスト全体のリピート
                            this.playNow(pl.videos[0], this.currentPlaylistId);
                        }
                    }
                }
            },

            // ====== シークバー・時間管理 ======
            updateVideoDuration() {
                if (!ytPlayer || !this.nowPlaying) return;
                const dur = ytPlayer.getDuration();
                if (dur > 0 && !this.nowPlaying.duration) {
                    const timeStr = this.formatTime(dur);
                    this.nowPlaying.duration = timeStr;
                    if (this.searchResult && this.searchResult.id === this.nowPlaying.id) this.searchResult.duration = timeStr;
                    
                    let updated = false;
                    this.playlists.forEach(pl => {
                        pl.videos.forEach(v => {
                            if (v.id === this.nowPlaying.id && !v.duration) { v.duration = timeStr; updated = true; }
                        });
                    });
                    if (updated) this.saveData();
                }
            },

            startProgressTracker() {
                clearInterval(progressTimer);
                progressTimer = setInterval(() => {
                    // ドラッグ中は数値を更新しない（シーク操作の妨げになるため）
                    if(ytPlayer && this.isPlaying && !this.isDragging) {
                        const curr = ytPlayer.getCurrentTime() || 0;
                        const dur = ytPlayer.getDuration() || 1;
                        this.progress = (curr / dur) * 100;
                        this.currentTimeStr = this.formatTime(curr);
                    }
                }, 1000);
            },

            seekTo(percent) {
                if (!ytPlayer || !this.nowPlaying) return;
                const dur = ytPlayer.getDuration();
                if (dur) {
                    const targetTime = (percent / 100) * dur;
                    ytPlayer.seekTo(targetTime, true);
                    this.currentTimeStr = this.formatTime(targetTime);
                    this.progress = percent;
                }
            },

            formatTime(sec) {
                const m = Math.floor(sec / 60); const s = Math.floor(sec % 60);
                return `${m}:${s.toString().padStart(2, '0')}`;
            },

            // ====== Media Session API ======
            setupMediaSession(video) {
                if ('mediaSession' in navigator && video) {
                    navigator.mediaSession.metadata = new MediaMetadata({
                        title: video.title,
                        artist: '小鳥Lab BGM Player',
                        album: this.currentPlaylistId ? 
                            this.playlists.find(p => p.id === this.currentPlaylistId)?.name : 'Single',
                        artwork: [
                            { src: video.thumb, sizes: '96x96',   type: 'image/jpeg' },
                            { src: video.thumb, sizes: '128x128', type: 'image/jpeg' },
                            { src: video.thumb, sizes: '192x192', type: 'image/jpeg' },
                            { src: video.thumb, sizes: '256x256', type: 'image/jpeg' },
                            { src: video.thumb, sizes: '384x384', type: 'image/jpeg' },
                            { src: video.thumb, sizes: '512x512', type: 'image/jpeg' },
                        ]
                    });

                    // OS側の再生状態を更新
                    navigator.mediaSession.playbackState = this.isPlaying ? "playing" : "paused";

                    // --- 通知バーのボタン操作設定 ---
                    
                    // 再生・一時停止
                    navigator.mediaSession.setActionHandler('play', () => this.togglePlay());
                    navigator.mediaSession.setActionHandler('pause', () => this.togglePlay());

                    // 次の曲（スキップ）
                    // これを定義することで通知バーに「次へ」ボタンが出現します
                    navigator.mediaSession.setActionHandler('nexttrack', () => {
                        this.skipNext();
                    });

                    // 前の曲（必要であれば）
                    navigator.mediaSession.setActionHandler('previoustrack', () => {
                        this.skipPrevious();
                    });

                    // 広告回避用：シーク操作の許可（通知バーのタイムバーを触った時用）
                    navigator.mediaSession.setActionHandler('seekto', (details) => {
                        if (details.seekTime && ytPlayer) {
                            ytPlayer.seekTo(details.seekTime, true);
                        }
                    });
                }
            }
        }
    }
